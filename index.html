/* ──────────────────────────────────────────────────────
 * 매개 ① 상태 머신 (Mediation 1 — 입력의 순간)
 *
 * 청사진 §3.1:
 *   · 클릭 후 1초의 매개. 누른 위치에서 빛이 형성됨 (응축형)
 *   · 1초 동안 다시 누르면 빛이 흩어지고 입력 철회 (시스템 흔적 없음)
 *   · 1초 후 빛이 떠날 준비 → 매개 ② (다음 단계에서 연결)
 *
 * 두 층으로 구현:
 *   (a) CSS 펄스: 클릭점 위에 즉각 응축
 *   (b) 3D 입자장 + focal light: 공간적 응축 (패널 가장자리로 새어나옴)
 * ──────────────────────────────────────────────────── */
const FORMING_DURATION   = 1.00;   // 청사진 §3.1: 1초
const DISPERSE_DURATION  = 0.45;
const COMMIT_FADE_DURATION = 0.60; // 1초 후 페이드 (다음 단계에서 매개 ②로 대체)
const GATHER_RADIUS      = 1.85;
const GATHER_BIAS        = 0.18;   // 멀리 있는 입자도 살짝 끌림 — 응축의 전체감

const mediation1 = {
  active: false,
  state: null,                    // 'forming' | 'dispersing' | 'committed'
  stateStartTime: 0,
  focal3D: new THREE.Vector3(),
  color: 0x9CC5E6,
  cssPulse: null,
  gatherStrength: 0,
  dispersFromStrength: 0,
  isAlert: false
};

const _ray = new THREE.Raycaster();
const _ndc = new THREE.Vector2();
const _focalPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 1.5); // z = -1.5
function projectClickTo3D(clickX, clickY) {
  const rect = canvas.getBoundingClientRect();
  _ndc.x =  ((clickX - rect.left) / rect.width)  * 2 - 1;
  _ndc.y = -((clickY - rect.top)  / rect.height) * 2 + 1;
  _ray.setFromCamera(_ndc, camera);
  const out = new THREE.Vector3();
  const hit = _ray.ray.intersectPlane(_focalPlane, out);
  return hit || new THREE.Vector3(0, 1.6, -1.5);
}
function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
}
function easeInQuad(t)  { return t * t; }                         // 가속 — 결정 거동의 무게
function easeOutQuad(t) { return 1 - (1 - t) * (1 - t); }         // 감속 — 결정화 sharp finish
function hexToCss(hex) {
  return '#' + hex.toString(16).padStart(6, '0');
}

function triggerMediation1(clickX, clickY, colorHex, isAlert) {
  // forming 중 두 번째 클릭 → 흩어짐 (철회)
  if (mediation1.active &amp;&amp; mediation1.state === 'forming') {
    mediation1.state = 'dispersing';
    mediation1.stateStartTime = clock.getElapsedTime();
    mediation1.dispersFromStrength = mediation1.gatherStrength;
    return;
  }
  // dispersing/committed 중에는 새 입력 무시 (안전을 위해 1초 사이클이 닫힌 후만)
  if (mediation1.active) return;
  // 매개 ②~④ 흐름 진행 중에도 새 입력 무시 — 응답이 도달할 때까지 기다림
  if (mediationFlow.active) return;

  const worldPos = projectClickTo3D(clickX, clickY);

  mediation1.active = true;
  mediation1.state = 'forming';
  mediation1.stateStartTime = clock.getElapsedTime();
  mediation1.focal3D.copy(worldPos);
  mediation1.color = colorHex;
  mediation1.isAlert = !!isAlert;

  // (a) CSS 펄스
  const pulse = document.createElement('div');
  pulse.className = 'mediation-pulse' + (isAlert ? ' amber' : '');
  pulse.style.left = clickX + 'px';
  pulse.style.top  = clickY + 'px';
  pulse.style.setProperty('--pulse-color', hexToCss(colorHex));
  document.body.appendChild(pulse);
  mediation1.cssPulse = pulse;

  // (b) 3D focal light
  focalLight.position.copy(worldPos);
  focalLight.material.color.setHex(colorHex);
  focalLight.material.opacity = 0;
  focalLight.scale.setScalar(0.4);
  focalLight.visible = true;
}

function endMediation1() {
  if (mediation1.cssPulse) {
    mediation1.cssPulse.remove();
    mediation1.cssPulse = null;
  }
  focalLight.visible = false;
  focalLight.material.opacity = 0;
  mediation1.active = false;
  mediation1.state = null;
  mediation1.gatherStrength = 0;
}

function updateMediation1(t) {
  if (!mediation1.active) {
    mediation1.gatherStrength = 0;
    return;
  }
  const elapsed = t - mediation1.stateStartTime;

  if (mediation1.state === 'forming') {
    if (elapsed >= FORMING_DURATION) {
      mediation1.state = 'committed';
      mediation1.stateStartTime = t;
      mediation1.gatherStrength = 1.0;
      // 매개 ② → ③ → 침묵 → ④ 자동 전이
      // (committed 페이드는 ① 클릭점의 정리, 흐름은 별도 스프라이트로 진행)
      startMediationFlow(mediation1.focal3D, mediation1.color, mediation1.isAlert);
    } else {
      const progress = elapsed / FORMING_DURATION;
      const ease = easeInOutCubic(progress);
      mediation1.gatherStrength = ease;

      const sizeNow = 12 + ease * 240;
      mediation1.cssPulse.style.width   = sizeNow + 'px';
      mediation1.cssPulse.style.height  = sizeNow + 'px';
      mediation1.cssPulse.style.opacity = (0.18 + ease * 0.55).toFixed(3);

      focalLight.material.opacity = ease * 0.55;
      focalLight.scale.setScalar(0.4 + ease * 1.6);
    }
  } else if (mediation1.state === 'dispersing') {
    if (elapsed >= DISPERSE_DURATION) {
      endMediation1();
    } else {
      const progress = elapsed / DISPERSE_DURATION;
      const fade = 1 - easeInOutCubic(progress);
      mediation1.gatherStrength = mediation1.dispersFromStrength * fade;

      // 흩어질 때 — 응축 시점의 실제 크기·불투명도에서 시작해 살짝 더 퍼지며 사라짐
      const baseSize    = 12 + mediation1.dispersFromStrength * 240;
      const baseOpacity = 0.18 + mediation1.dispersFromStrength * 0.55;
      const sizeNow     = baseSize + (1 - fade) * 60;
      mediation1.cssPulse.style.width   = sizeNow + 'px';
      mediation1.cssPulse.style.height  = sizeNow + 'px';
      mediation1.cssPulse.style.opacity = (fade * baseOpacity).toFixed(3);

      focalLight.material.opacity = fade * mediation1.dispersFromStrength * 0.55;
      focalLight.scale.setScalar(0.4 + mediation1.dispersFromStrength * 1.6 + (1 - fade) * 0.3);
    }
  } else if (mediation1.state === 'committed') {
    if (elapsed >= COMMIT_FADE_DURATION) {
      endMediation1();
    } else {
      const progress = elapsed / COMMIT_FADE_DURATION;
      const fade = 1 - easeInOutCubic(progress);
      mediation1.gatherStrength = fade;
      mediation1.cssPulse.style.opacity = (fade * 0.55).toFixed(3);
      focalLight.material.opacity = fade * 0.55;
    }
  }
}

/* ──────────────────────────────────────────────────────
 * 매개 ② → ③ → 침묵 → ④  흐름 상태 머신
 *
 * 청사진 §3.2~§3.4 의 *위로 떠나고 / 진입하고 / 응답이 내려옴* 호흡.
 * 청사진 시간은 ② 2~3초 / ③ 0.5~1초 / 침묵 20~30초 / ④ 3~4초 였으나,
 * 한국어 문화권의 집중 호흡(버튼 누른 직후 주의력 휘발)에 맞춰
 * 검토 단계에서 약 4초 안에 응답이 캡슐 안으로 들어오도록 *압축*했음.
 * 시나리오 통합 단계에서 청사진 수치로 다시 늘릴 자리.
 * ──────────────────────────────────────────────────── */
const FLOW_DEPART_DURATION    = 1.00;  // ②  · 청사진 2~3초
// ③ 직전 미세 박동 (이상 발견 보고만 — 일반 통과는 박동 없음)
const FLOW_ALERT_PULSE_DURATION = 0.40;
const FLOW_ENTRY_DURATION     = 0.30;  // ③  · 청사진 0.5~1초
const FLOW_SILENCE_DURATION   = 0.50;  //    · 청사진 20~30초
// 응답이 *내려오는 속도* — 빠르면 빛이 안 보임. 천천히 내려와야 위계의 무게가 전달됨
const FLOW_RESPONSE_DURATION  = 2.20;  // ④  · 청사진 3~4초
const FLOW_ABSORB_DURATION    = 0.80;  //    · ④의 흡수 마감
const FLOW_M5_GAP_AFTER_M4    = 1.00;  // 매개 ④ 종료 후 ⑤ 시작까지 (시연: 4-5초)
const FLOW_M5_GAP_NO_M4       = 1.00;  // ④ 없는 분기 B(이상 없음)에서 silence 후 ⑤ 까지

const mediationFlow = {
  active: false,
  phase: null,                   // 'depart' | 'entry' | 'silence' | 'response' | 'absorb'
  phaseStart: 0,
  focalStart: new THREE.Vector3(),
  color: 0x9CC5E6,
  responseColor: 0xF2C078,
  isAlert: false
};

function startMediationFlow(focal, color, isAlert) {
  mediationFlow.active = true;
  mediationFlow.phase = 'depart';
  mediationFlow.phaseStart = clock.getElapsedTime();
  mediationFlow.focalStart.copy(focal);
  mediationFlow.color = color;
  mediationFlow.isAlert = !!isAlert;
  // 응답 색 — 따뜻한 흰빛. 이상 발견(앰버)이었으면 살짝 따뜻한 톤이 섞임
  mediationFlow.responseColor = isAlert ? 0xEFB270 : 0xF2C078;

  streamLight.material.color.setHex(color);
  streamLight.material.opacity = 0.65;
  streamLight.position.copy(focal);
  streamLight.scale.set(1.0, 1.0, 1.0);
  streamLight.visible = true;
}

function updateMediationFlow(t) {
  if (!mediationFlow.active) return;
  const elapsed = t - mediationFlow.phaseStart;

  if (mediationFlow.phase === 'depart') {
    // ②  focal → exit point. 부드러운 응축이 *유체적으로 길게 늘어나며* 떠남
    if (elapsed >= FLOW_DEPART_DURATION) {
      // 분기 — alert(이상 발견) 일 때만 ③ 직전 미세 박동, 아니면 바로 ③
      mediationFlow.phase = mediationFlow.isAlert ? 'alert_pulse' : 'entry';
      mediationFlow.phaseStart = t;
      streamLight.position.copy(FLOW_EXIT_POINT);
    } else {
      const progress = elapsed / FLOW_DEPART_DURATION;
      const ease = easeInOutCubic(progress);
      const sx = mediationFlow.focalStart.x;
      const sy = mediationFlow.focalStart.y;
      const sz = mediationFlow.focalStart.z;
      // 직선 lerp + 살짝 위로 굽는 곡선 (peak 0.15m at midpoint)
      const arc = Math.sin(progress * Math.PI) * 0.15;
      streamLight.position.x = sx + (FLOW_EXIT_POINT.x - sx) * ease;
      streamLight.position.y = sy + (FLOW_EXIT_POINT.y - sy) * ease + arc;
      streamLight.position.z = sz + (FLOW_EXIT_POINT.z - sz) * ease;
      // 길어지며 옴 — 가로 살짝 좁아지고 세로 늘어남 (유체 거동)
      streamLight.scale.set(1.0 - ease * 0.40, 1.0 + ease * 1.30, 1.0);
      streamLight.material.opacity = 0.65 - ease * 0.18;
    }
  } else if (mediationFlow.phase === 'alert_pulse') {
    // ③ 직전 미세 박동 — *명시적 이상 발견 보고만* (청사진 §3.3)
    // 빛이 압축되었다 풀리는 짧은 한 번. 일반 통과는 이 phase 건너뜀
    if (elapsed >= FLOW_ALERT_PULSE_DURATION) {
      mediationFlow.phase = 'entry';
      mediationFlow.phaseStart = t;
    } else {
      const progress = elapsed / FLOW_ALERT_PULSE_DURATION;
      if (progress < 0.5) {
        // 압축 — 좁아지며 더 또렷해짐
        const sub = progress / 0.5;
        const eIn = easeInQuad(sub);
        streamLight.scale.set(0.55 - eIn * 0.20, 1.35 - eIn * 0.45, 1.0);
        streamLight.material.opacity = 0.55 + eIn * 0.32;
      } else {
        // 풀림 — 다시 entry shape 으로 흘러들어감 (다음 phase 와 부드럽게 연결)
        const sub = (progress - 0.5) / 0.5;
        const eOut = easeOutQuad(sub);
        streamLight.scale.set(0.35 + eOut * 0.45, 0.90 + eOut * 0.50, 1.0);
        streamLight.material.opacity = 0.87 - eOut * 0.32;
      }
    }
  } else if (mediationFlow.phase === 'entry') {
    // ③ 출구에서 짧게 부풀었다가 사라짐 (*부드럽게 흐려지며 멀어지듯*)
    if (elapsed >= FLOW_ENTRY_DURATION) {
      mediationFlow.phase = 'silence';
      mediationFlow.phaseStart = t;
      streamLight.visible = false;
    } else {
      const progress = elapsed / FLOW_ENTRY_DURATION;
      streamLight.material.opacity = 0.50 * Math.sin(progress * Math.PI);
      streamLight.scale.set(0.7 + progress * 0.5, 2.20 - progress * 1.30, 1.0);
    }
  } else if (mediationFlow.phase === 'silence') {
    // 처리의 침묵 (압축됨). 위계 호흡이 여전히 진행 중 — 시각언어로는 *기다림*
    if (elapsed >= FLOW_SILENCE_DURATION) {
      // 분기 — 청사진 §5
      //   A (이상 발견 = isAlert): ④ 자기 응답 회로 → 흡수 → ⑤
      //   B (이상 없음 = !isAlert): ④ 없음 → 갭 → ⑤ 만 도달
      if (mediationFlow.isAlert) {
        mediationFlow.phase = 'response';
        mediationFlow.phaseStart = t;
        responseLight.material.color.setHex(mediationFlow.responseColor);
        responseLight.position.copy(FLOW_HAZE_START);
        responseLight.material.opacity = 0;
        responseLight.scale.set(0.8, 0.8, 1.0);
        responseLight.visible = true;
      } else {
        // 분기 B (이상 없음 click) — 흐름 종료. 갭 후 ⑤ 만 트리거
        mediationFlow.active = false;
        mediationFlow.phase = null;
        setTimeout(() => startMediation5(), FLOW_M5_GAP_NO_M4 * 1000);
      }
    }
  } else if (mediationFlow.phase === 'response') {
    // ④ 위계 → 캡슐 위쪽 가장자리. 부드러운 빛이 천천히 내려옴
    if (elapsed >= FLOW_RESPONSE_DURATION) {
      mediationFlow.phase = 'absorb';
      mediationFlow.phaseStart = t;
    } else {
      const progress = elapsed / FLOW_RESPONSE_DURATION;
      const ease = easeInOutCubic(progress);
      responseLight.position.x = FLOW_HAZE_START.x + (FLOW_EXIT_POINT.x - FLOW_HAZE_START.x) * ease;
      responseLight.position.y = FLOW_HAZE_START.y + (FLOW_EXIT_POINT.y - FLOW_HAZE_START.y) * ease;
      responseLight.position.z = FLOW_HAZE_START.z + (FLOW_EXIT_POINT.z - FLOW_HAZE_START.z) * ease;
      responseLight.material.opacity = ease * 0.55;
      responseLight.scale.set(0.8 + ease * 0.7, 0.8 + ease * 0.7, 1.0);
    }
  } else if (mediationFlow.phase === 'absorb') {
    // 캡슐 위쪽 가장자리에 닿으면 *부드럽게 캡슐 안으로 흡수* (매개 ②와 정반대)
    if (elapsed >= FLOW_ABSORB_DURATION) {
      mediationFlow.active = false;
      mediationFlow.phase = null;
      responseLight.visible = false;
      // 분기 A — ④ 종료 후 갭 두고 매개 ⑤ 자동 트리거
      setTimeout(() => startMediation5(), FLOW_M5_GAP_AFTER_M4 * 1000);
    } else {
      const progress = elapsed / FLOW_ABSORB_DURATION;
      const ease = easeInOutCubic(progress);
      // 캡슐 안으로 약간 더 내려오며 흡수
      responseLight.position.y = FLOW_EXIT_POINT.y - ease * 0.85;
      // 짧게 빛나다 사라짐
      const fade = Math.sin((1 - progress) * Math.PI * 0.5);
      responseLight.material.opacity = fade * 0.55;
      responseLight.scale.set(1.3 + (1 - fade) * 0.5, 1.3 + (1 - fade) * 0.5, 1.0);
    }
  }
}

/* ──────────────────────────────────────────────────────
 * 매개 ⑤ 상태머신 — 통제 명령 (결정 거동)
 *
 * 청사진 §3.5 의 4~5초가 실제 시연 호흡. 검토 단계에서는 압축:
 *   응축    0.50s   haze 한 점이 흐릿하게 모임
 *   결정화  0.35s   날카로운 결정 형태로 굳어짐
 *   강하    0.85s   easeInQuad — 가속하며 캡슐 가장자리로
 *   박힘    0.20s   살짝 진동 후 단단히 자리잡음
 *   embedded ∞      체험 끝까지 머묾 (박힌 형태)
 *
 * 트리거 두 경로:
 *   A) 분기 A — 매개 ④ 흡수 종료 후 1초 갭 (시연: 4-5초)
 *   B) 분기 B — 안내창 자동 변형(타임아웃) 후 약 3초 갭, ④ 없이 ⑤ 만 도달
 *      또는 *이상 없음* 클릭 → ① ② ③ → silence → ④ 없이 ⑤ 로 1초 갭
 * ──────────────────────────────────────────────────── */
const M5_CONDENSE_DURATION = 0.50;
const M5_FORM_DURATION     = 0.35;
const M5_DESCEND_DURATION  = 0.85;
const M5_IMPACT_DURATION   = 0.20;

const mediation5 = {
  active: false,
  phase: null,           // 'condense' | 'form' | 'descend' | 'impact' | 'embedded'
  phaseStart: 0,
  embedded: false        // true 가 되면 영원히 단단함 유지, 다시 트리거 안 됨
};

function startMediation5() {
  if (mediation5.embedded) return;     // 이미 박혀있으면 무시
  if (mediation5.active)   return;     // 진행 중이면 무시
  mediation5.active = true;
  mediation5.phase = 'condense';
  mediation5.phaseStart = clock.getElapsedTime();
  // 결정 초기 상태 — haze 위치, 흐리고 작음
  crystalMesh.position.copy(M5_HAZE_CENTER);
  crystalMesh.scale.set(0.30, 0.30, 1);
  crystalMesh.material.opacity = 0;
  crystalMesh.visible = true;
}

function updateMediation5(t) {
  if (!mediation5.active) return;
  if (mediation5.phase === 'embedded') return;   // 박힘 후 정적 — 아무 갱신 없음

  const elapsed = t - mediation5.phaseStart;

  if (mediation5.phase === 'condense') {
    if (elapsed >= M5_CONDENSE_DURATION) {
      mediation5.phase = 'form';
      mediation5.phaseStart = t;
    } else {
      // 응축: haze에서 한 점으로. *부드러운 산개에서 집중된 점*
      const progress = elapsed / M5_CONDENSE_DURATION;
      const ease = easeInOutCubic(progress);
      crystalMesh.material.opacity = ease * 0.40;          // 흐릿한 단계
      crystalMesh.scale.set(0.30 + ease * 0.30, 0.30 + ease * 0.35, 1);
    }
  } else if (mediation5.phase === 'form') {
    if (elapsed >= M5_FORM_DURATION) {
      mediation5.phase = 'descend';
      mediation5.phaseStart = t;
    } else {
      // 결정화: 빛이 *날카로운 형태로 굳어짐*. easeOutQuad — sharp finish
      const progress = elapsed / M5_FORM_DURATION;
      const ease = easeOutQuad(progress);
      crystalMesh.material.opacity = 0.40 + ease * 0.55;
      crystalMesh.scale.set(0.60 + ease * 0.40, 0.65 + ease * 0.40, 1);
    }
  } else if (mediation5.phase === 'descend') {
    if (elapsed >= M5_DESCEND_DURATION) {
      mediation5.phase = 'impact';
      mediation5.phaseStart = t;
      crystalMesh.position.copy(M5_EMBED_CENTER);
    } else {
      // 강하: easeInQuad — 가속. 결정의 무게가 떨어지듯
      const progress = elapsed / M5_DESCEND_DURATION;
      const ease = easeInQuad(progress);
      crystalMesh.position.lerpVectors(M5_HAZE_CENTER, M5_EMBED_CENTER, ease);
      crystalMesh.material.opacity = 0.95;
      crystalMesh.scale.set(1.0, 1.0, 1);
    }
  } else if (mediation5.phase === 'impact') {
    if (elapsed >= M5_IMPACT_DURATION) {      mediation5.phase = 'embedded';
      mediation5.embedded = true;
      // 단단히 자리잡음 — 이후 갱신 없음
      crystalMesh.position.copy(M5_EMBED_CENTER);
      crystalMesh.scale.set(1.0, 1.0, 1);
      crystalMesh.material.opacity = 1.0;
      // 모든 매개 종료 → 잠시 여운 후 완료 패널
      if (!completionShown) {
        completionShown = true;
        setTimeout(showCompletion, 1400);
      }
    } else {
      // 박힘: 짧게 진동하다 정지. 살짝 위로 튕긴 후 가라앉음
      const progress = elapsed / M5_IMPACT_DURATION;
      const fade = 1 - progress;
      const wobble = Math.sin(progress * Math.PI * 4) * fade * 0.04;
      crystalMesh.position.y = M5_EMBED_CENTER.y + wobble;
      crystalMesh.material.opacity = 1.0;
      crystalMesh.scale.set(1.0 + wobble * 0.10, 1.0 - wobble * 0.06, 1);
    }
  }
}

/* 시나리오 종료 — 완료 패널 등장 (한 번만) */
let completionShown = false;
function showCompletion() {
  const el = document.getElementById('completion');
  if (el) el.classList.add('visible');
}

/* ──────────────────────────────────────────────────────
 * 진입 시퀀스 (Entry) — 박사 논증 재배치
 *   청사진 §3 의 *처리의 침묵 20-30초*는 가상공간이 잡아두기 어려움.
 *   대신 타이틀에서 작업자 화면으로 *진입하는 시간*에 매개의 핵심 자리를 둠.
 *   방 안의 매개들은 압축 시간을 유지.
 *
 * 검토 단계의 6.5초 시퀀스:
 *   0~1.5s   검은 화면 + 위→아래 빛의 흐름   (CSS 오버레이로 구현)
 *   1.5~2.5s 페이드아웃 → 작업자 화면 등장   (CSS transition)
 *   2.5~6.5s 카메라: 위에서 내려다보기 → 우물 바닥에서 올려다보기 (4초)
 * ──────────────────────────────────────────────────── */
const ENTRY = {
  PHASE2_END: 2.5,                                    // fade-in 완료 시점
  PHASE3_END: 6.5,                                    // 카메라 전이 완료 시점
  cameraInitialPos:  new THREE.Vector3(0, 2.7,  0.5),
  cameraInitialLook: new THREE.Vector3(0, 0.8, -2.2),
  cameraFinalPos:    new THREE.Vector3(0, 1.6,  0.2),
  cameraFinalLook:   new THREE.Vector3(0, 3.2, -2.6),
  done: false
};
const _entryLook = new THREE.Vector3();

function updateEntry(t) {
  if (ENTRY.done) return;

  if (t < ENTRY.PHASE2_END) {
    // 진입 1·2 단계: 카메라는 초기 위치 고정 (오버레이가 가리고 있음 / 페이드인 중)
    camera.position.copy(ENTRY.cameraInitialPos);
    camera.lookAt(ENTRY.cameraInitialLook);
  } else if (t < ENTRY.PHASE3_END) {
    // 진입 3 단계: 4초에 걸쳐 위→아래 시점에서 아래→위 시점으로 부드럽게 전이
    const progress = (t - ENTRY.PHASE2_END) / (ENTRY.PHASE3_END - ENTRY.PHASE2_END);
    const ease = easeInOutCubic(progress);
    camera.position.lerpVectors(ENTRY.cameraInitialPos, ENTRY.cameraFinalPos, ease);
    _entryLook.lerpVectors(ENTRY.cameraInitialLook, ENTRY.cameraFinalLook, ease);
    camera.lookAt(_entryLook);
  } else {
    camera.position.copy(ENTRY.cameraFinalPos);
    camera.lookAt(ENTRY.cameraFinalLook);
    ENTRY.done = true;
  }
}

// 진입 오버레이 페이드아웃 — 1.5s 후 시작, 1s 페이드, 그 후 display:none
(function scheduleEntryFade() {
  const overlay = document.getElementById('entryOverlay');
  if (!overlay) return;
  setTimeout(() => overlay.classList.add('fading-out'), 1500);
  setTimeout(() => overlay.classList.add('gone'),       2700);  // 페이드 완료 + 여유
})();

/* ── 진입 매개(transition) — 디더 빛 빔 ──
   매끄러운 글로우 줄기 대신, 위→아래로 내려오는 *디더된 빛*.
   타이틀→매개→워커챔버 전체가 같은 도트 언어로 이어짐. */
(function entryDitherBeam() {
  const cv = document.getElementById('entryBeam');
  const ov = document.getElementById('entryOverlay');
  if (!cv || !ov) return;
  const ctx = cv.getContext('2d');
  const BAYER = [[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
  const CELL = 3, DOT = 2, DUR = 1500;
  let W = 0, H = 0;
  function size() {
    const r = ov.getBoundingClientRect();
    W = Math.max(2, r.width | 0); H = Math.max(2, r.height | 0);
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    cv.width = W * dpr; cv.height = H * dpr;
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  size();
  let start = null;
  function frame(ts) {
    if (start === null) start = ts;
    const p = Math.min(1, (ts - start) / DUR);
    const peakY = (-0.12 + 1.24 * p) * H;     // 빔이 위→아래로 내려옴
    const cx = W / 2, beamW = Math.max(60, W * 0.09), tailH = H * 0.34;
    ctx.clearRect(0, 0, W, H);
    for (let y = 0; y < H; y += CELL) {
      const vlum = Math.max(0, 1 - Math.abs(y - peakY) / tailH);
      if (vlum <= 0) continue;
      const brow = BAYER[((y / CELL) | 0) &amp; 3];
      for (let x = 0; x < W; x += CELL) {
        const dx = Math.abs(x - cx) / beamW;
        const lum = vlum * Math.max(0, 1 - dx * dx);
        if (lum <= 0) continue;
        const t = (brow[((x / CELL) | 0) &amp; 3] + 0.5) / 16;
        if (lum > t) {
          const b = Math.min(255, (lum * 300) | 0);    // 밝은 응축 빛
          ctx.fillStyle = 'rgb(' + b + ',' + Math.min(255,(b*0.95)|0) + ',' + Math.min(255,(b*0.80)|0) + ')';
          ctx.fillRect(x, y, DOT, DOT);
        }
      }
    }
    if (p < 1) requestAnimationFrame(frame);
    else ctx.clearRect(0, 0, W, H);
  }
  requestAnimationFrame(frame);
})();

// 진단 — 옆 작업자 그림자 4개의 화면상 위치 (final 카메라 기준)
setTimeout(() => {
  if (typeof sideShadows === 'undefined') return;
  const tmp = camera.clone();
  tmp.position.copy(ENTRY.cameraFinalPos);
  tmp.lookAt(ENTRY.cameraFinalLook);
  tmp.updateMatrixWorld(true);
  const rect = canvas.getBoundingClientRect();
  console.log('═══ 옆 작업자 그림자 · 화면상 위치 (final 카메라 기준) ═══');
  sideShadows.forEach((s, i) => {
    const w = s.position.clone();
    const ndc = w.project(tmp);
    const sx = (ndc.x * 0.5 + 0.5) * rect.width;
    const sy = (1 - (ndc.y * 0.5 + 0.5)) * rect.height;
    const inFrustum = Math.abs(ndc.x) <= 1 &amp;&amp; Math.abs(ndc.y) <= 1 &amp;&amp; ndc.z >= -1 &amp;&amp; ndc.z <= 1;
    console.log(
      `shadow ${i}:`,
      `world=(${s.position.x.toFixed(2)}, ${s.position.y.toFixed(2)}, ${s.position.z.toFixed(2)})`,
      `→ screen=(${sx.toFixed(0)}px, ${sy.toFixed(0)}px)`,
      `ndc=(${ndc.x.toFixed(2)}, ${ndc.y.toFixed(2)}, ${ndc.z.toFixed(2)})`,
      `inFrustum=${inFrustum}`
    );
  });
  console.log(`canvas: ${rect.width.toFixed(0)} × ${rect.height.toFixed(0)}px`);
}, 600);

/* ──────────────────────────────────────────────────────
 * 안내창 (Guidance Window) 상태 머신 — 청사진 §6
 *   · 35초에 페이드인
 *   · 등장 후 30초 안에 클릭 없으면 14:32 단일 출처 경보로 자동 변형
 *   · 클릭으로 즉시 사라짐 (부드러운 페이드)
 * ──────────────────────────────────────────────────── */
// 검토 단계 임시값 — 시나리오 통합 때 청사진 §6.4 값으로 되돌릴 것
//   · APPEAR_AT:       청사진 35  → 검토용 0   (페이지 로드와 동시에 등장)
//   · TRANSFORM_DELAY: 청사진 30  → 검토용 300 (검토 중 자동 변형 방지)
const GUIDANCE_APPEAR_AT       = 0;    // seconds  (원래 35)
const GUIDANCE_TRANSFORM_DELAY = 300;  // seconds after appearing  (원래 30)

const guidance = {
  appeared: false,
  transformed: false,
  dismissed: false,
  appearedAt: 0
};
const guidanceEl = document.getElementById('guidanceWindow');
const gwTime     = document.getElementById('gwTime');
const gwHeadline = document.getElementById('gwHeadline');
const gwBody     = document.getElementById('gwBody');

function dismissGuidance() {
  if (guidance.dismissed) return;
  guidance.dismissed = true;
  guidanceEl.classList.remove('visible');
  guidanceEl.classList.add('dismissed');
}
function transformGuidance() {
  if (guidance.transformed || guidance.dismissed) return;
  guidance.transformed = true;
  guidanceEl.classList.add('swapping');
  setTimeout(() => {
    gwTime.textContent     = '14:32';
    gwHeadline.textContent = '단일 출처 경보로 처리됨';
    gwBody.textContent     = '보고가 없어 단일 출처로 분류되었습니다.';
    guidanceEl.classList.remove('swapping');
  }, 600);
}
function appearGuidance(t) {
  if (guidance.appeared || guidance.dismissed) return;
  guidance.appeared = true;
  guidance.appearedAt = t;
  guidanceEl.classList.add('visible');
}
// 클릭으로 사라지지 않음 — 체크리스트 7/7 해결 시에만 자동 사라짐 (아래 setupMediationTriggers)
// (시나리오 통합 단계에서 *이상 발견* 보고 시 사라짐 분기를 다시 연결할 예정)

// 분기 B 타임아웃 — 안내창 자동 변형 후 ⑤ 까지의 침묵 (검토 압축값)
const FLOW_M5_GAP_AFTER_TIMEOUT = 3.0;

function updateGuidance(t) {
  if (!guidance.appeared &amp;&amp; t >= GUIDANCE_APPEAR_AT) {
    appearGuidance(t);
  }
  if (guidance.appeared &amp;&amp; !guidance.transformed &amp;&amp; !guidance.dismissed
      &amp;&amp; (t - guidance.appearedAt) >= GUIDANCE_TRANSFORM_DELAY) {
    transformGuidance();
    // 분기 B (타임아웃) — 안 누름. 매개 ⑤만 도달 (④ 없음). 짧은 침묵 후 자동 트리거
    // 청사진 §5: ~65~90초 처리의 침묵 → ~90초 매개 ⑤만 도달. 검토 단계는 3초로 압축.
    setTimeout(() => startMediation5(), FLOW_M5_GAP_AFTER_TIMEOUT * 1000);
  }
}

/* ──────────────────────────────────────────────────────
 * 클릭 핸들러 — 체크리스트 토글 + 두 큰 버튼
 *   · 통과(passed) 항목 + 이상 없음: 차가운 빛 #9CC5E6
 *   · 미통과(pending) 항목 + 이상 발견: 앰버 #EF9F27
 * ──────────────────────────────────────────────────── */
(function setupMediationTriggers() {
  const okBtn    = document.querySelector('.rr-btn-ok');
  const alertBtn = document.querySelector('.rr-btn-alert');
  const items    = document.querySelectorAll('.chk-item');

  if (okBtn) okBtn.addEventListener('click', (e) => {
    if (okBtn.classList.contains('disabled')) return;   // 7/7 이전엔 비활성
    triggerMediation1(e.clientX, e.clientY, 0x9CC5E6, false);
    // 시나리오 B — 모든 항목을 통과 처리 + 이상 없음 = 안내를 무시한 결과
    // → 안내창은 &quot;단일 출처 경보로 처리됨&quot;으로 변형되어 그 결과를 시각화
    if (guidance.appeared &amp;&amp; !guidance.transformed &amp;&amp; !guidance.dismissed) {
      transformGuidance();
    }
  });
  if (alertBtn) alertBtn.addEventListener('click', (e) => {
    if (alertBtn.classList.contains('disabled')) return;  // 7/7 도달 시 비활성
    triggerMediation1(e.clientX, e.clientY, 0xEF9F27, true);
    // 시나리오 A — 이상 발견 보고 = 안내를 제대로 받아 행동
    // → 안내창 부드럽게 사라짐 (청사진 §5 시나리오 A · 안내창 부드럽게 사라짐)
    if (guidance.appeared &amp;&amp; !guidance.dismissed) {
      dismissGuidance();
    }
  });
  // 체크리스트 항목 클릭 → 매개 ①
  // 색상은 *결과 상태*로 결정 (청사진 §8.4):
  //   현재 미체크(pending) → 체크됨(통과) = 차가운 빛 #9CC5E6
  //   현재 체크(passed)    → 미체크(미통과) = 앰버 #EF9F27
  items.forEach((item) => {
    item.addEventListener('click', (e) => {
      const willUncheck = item.classList.contains('passed');
      const color = willUncheck ? 0xEF9F27 : 0x9CC5E6;
      triggerMediation1(e.clientX, e.clientY, color, willUncheck);
    });
  });

  // ── 체크리스트 상태 동기화 + 해결 감지 ────────────────
  // 체크박스 변경 시:
  //   · 부모 .chk-item 의 .passed/.pending 클래스 갱신 (시각 반영)
  //   · 뱃지 / 모달 푸터의 진행률 텍스트 갱신
  //   · 7/7 도달하면 안내창 부드럽게 사라짐
  const checkboxes    = document.querySelectorAll('.chk-item input[type=&quot;checkbox&quot;]');
  const badgeCountEl  = document.getElementById('checklistBadgeCount');
  const footerStrong  = document.getElementById('checklistFooterStrong');
  const total = checkboxes.length;

  function updateChecklistUI() {
    let checked = 0;
    checkboxes.forEach((cb) => {
      const it = cb.closest('.chk-item');
      if (cb.checked) {
        checked++;
        if (it) { it.classList.remove('pending'); it.classList.add('passed'); }
      } else {
        if (it) { it.classList.remove('passed'); it.classList.add('pending'); }
      }
    });
    if (badgeCountEl) badgeCountEl.textContent = `체크리스트 ${checked}/${total} ▸`;
    if (footerStrong) {
      footerStrong.textContent = checked === total
        ? `진행률 ${checked}/${total} · &quot;이상 없음&quot; 제출 가능`
        : `진행률 ${checked}/${total} · &quot;이상 없음&quot; 버튼 비활성화 상태`;
    }
    // 두 버튼의 상호배타적 활성 상태:
    //   · 7/7 체크 → 이상 없음만 활성, 이상 발견 비활성
    //   · 그 외(0..6/7) → 이상 발견만 활성, 이상 없음 비활성
    const allChecked = (checked === total);
    if (okBtn) {
      okBtn.classList.toggle('disabled', !allChecked);
      okBtn.setAttribute('aria-disabled', String(!allChecked));
    }
    if (alertBtn) {
      alertBtn.classList.toggle('disabled', allChecked);
      alertBtn.setAttribute('aria-disabled', String(allChecked));
    }
    return checked;
  }

  // 체크 상태 변경은 시각/카운트/버튼 활성화만 갱신 — 안내창은 건드리지 않음
  // (안내창의 운명은 *이상 발견* / *이상 없음* 버튼 클릭으로만 결정됨)
  function onChecklistChange() {
    updateChecklistUI();
  }
  checkboxes.forEach((cb) => cb.addEventListener('change', onChecklistChange));
  updateChecklistUI();   // 초기 0/7 동기화
})();

/* ──────────────────────────────────────────────────────
 * Animation loop
 *   · 위계 호흡 (7.5s)
 *   · 입자장 — 브라운 운동 + (매개 ① 활성 시) 응축
 *   · 옆 작업자 그림자 천천히 흔들림
 *   · 별들 미세 트윙클
 *   · 매개 ① 상태 갱신
 *   · 안내창 타이머
 * ──────────────────────────────────────────────────── */
const clock = new THREE.Clock();
let prevT = 0;

function animate() {
  const t  = clock.getElapsedTime();
  const dt = Math.min(0.05, t - prevT);
  prevT = t;

  // 진입 시퀀스 — 카메라 위치/시선 갱신 (다른 무엇보다 먼저)
  updateEntry(t);

  // 위계 호흡 (7.5s) — 헤이즈 톤은 살리고, 디더가 그 명암을 도트로 표현
  const breathe = 0.78 + 0.22 * Math.sin(t * (Math.PI * 2) / 7.5);
  haze.material.opacity = breathe * 0.85;
  const twinkle = 0.55 + 0.18 * Math.sin(t * (Math.PI * 2) / 5.7 + 1.1);
  stars.material.opacity = twinkle;

  // 매개 ① 상태 먼저 갱신 — 입자장 응축이 이 값을 사용
  updateMediation1(t);
  // 매개 ② → ③(±박동) → 침묵 → ④ 흐름 갱신
  updateMediationFlow(t);
  // 매개 ⑤ 결정 거동 — 박힘 후엔 정적
  updateMediation5(t);

  // 입자장 — 브라운 운동 + 응축
  const fp = fieldGeo.attributes.position.array;
  const gather = mediation1.gatherStrength;
  const focal  = mediation1.focal3D;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const ph = fieldPhase[i];
    const sp = fieldSpeed[i];
    const bx = fieldBase[3*i + 0];
    const by = fieldBase[3*i + 1];
    const bz = fieldBase[3*i + 2];
    let x = bx + Math.sin(t * sp + ph) * 0.018;
    let y = by + Math.cos(t * sp * 0.83 + ph * 1.13) * 0.022
                + Math.sin(t * 0.10 + ph) * 0.005;
    let z = bz + Math.sin(t * sp * 0.71 + ph * 0.69) * 0.014;

    if (gather > 0.001) {
      const dx = focal.x - x;
      const dy = focal.y - y;
      const dz = focal.z - z;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
      if (dist < GATHER_RADIUS) {
        const proximity = 1 - dist / GATHER_RADIUS;
        const pull = gather * (proximity * (1 - GATHER_BIAS) + GATHER_BIAS);
        x = x * (1 - pull) + focal.x * pull;
        y = y * (1 - pull) + focal.y * pull;
        z = z * (1 - pull) + focal.z * pull;
      }
    }
    fp[3*i + 0] = x;
    fp[3*i + 1] = y;
    fp[3*i + 2] = z;
  }
  fieldGeo.attributes.position.needsUpdate = true;
  // 호흡 + 매개 ① 시 살짝 더 또렷
  field.material.opacity = 0.28
                         + 0.06 * Math.sin(t * (Math.PI * 2) / 7.5)
                         + 0.18 * gather;

  // 옆 작업자 그림자 — *살아있음*의 신호 (블러 유리 너머의 형태가 인지되도록 강화)
  for (let i = 0; i < sideShadows.length; i++) {
    const s = sideShadows[i];
    const u = s.userData;
    // 기본 sway + 미세 트레모르 (고주파 작은 흔들림으로 *움직임의 활성*을 보강)
    s.position.x = u.base.x
      + Math.sin(t * u.speed         + u.phase)             * u.swayX
      + Math.sin(t * u.microSpeed    + u.microPhase)        * 0.05;
    s.position.y = u.base.y
      + Math.sin(t * u.speed * 0.71  + u.phase * 1.27)      * u.swayY
      + Math.sin(t * u.microSpeed * 0.83 + u.microPhase*1.3)* 0.03;
    // 호흡(opacity) — 진폭 살짝 강화
    const opPhase = Math.sin(t * u.speed * 0.41 + u.phase * 0.83);
    s.material.opacity = u.baseOp + 0.10 * opPhase;
  }

  // 안내창 타이머
  updateGuidance(t);

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

animate();

/* ──────────────────────────────────────────────────────
 * 열람실 체크리스트 모달 토글
 *   · 뱃지 클릭 → 7항목 팝업
 *   · 닫기: × 버튼 / 배경 클릭 / Esc
 * ──────────────────────────────────────────────────── */
(function () {
  const badge   = document.getElementById('checklistBadge');
  const overlay = document.getElementById('checklistOverlay');
  const closeBtn = document.getElementById('checklistClose');
  if (!badge || !overlay) return;

  function open()  { overlay.classList.add('open'); }
  function close() { overlay.classList.remove('open'); }

  badge.addEventListener('click', open);
  badge.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); }
  });
  closeBtn.addEventListener('click', close);
  closeBtn.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); close(); }
  });
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) close();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') close();
  });
})();

/* ──────────────────────────────────────────────────────

 *  function triggerMediation3() { ... }    // 진입
 *  function triggerMediation4(severity) {}  // 자기 응답 (α)
 *  function triggerMediation5() { ... }     // 통제 명령 (β)
 *  function runScenarioA() / runScenarioB()
 * ──────────────────────────────────────────────────── */
</script>

<script>
/* ── 디더 레이어 — 렌더된 장면의 *톤 자체*를 도트 밀도로 변환 ──
   매끄러운 그라데이션 위에 도트를 얹는 게 아니라, WebGL이 그린 장면을
   매 프레임 읽어 Bayer 4×4 오더드 디더로 다시 그림 → 그라데이션이 곧 디더가 됨.
   밝을수록 조밀한 점, 어두울수록 빈 공간. 점의 색은 장면의 색을 유지.
   흰 계기 창은 위(z6)에 불투명하게 얹혀 자연히 덮음. */
(function () {
  const area = document.querySelector('.canvas-area');
  const src  = document.getElementById('scene-canvas');
  if (!area || !src) return;

  const cv = document.createElement('canvas');
  cv.id = 'dither-layer';
  area.appendChild(cv);
  const ctx = cv.getContext('2d');

  const small = document.createElement('canvas');           // 셀 해상도 다운샘플
  const sctx = small.getContext('2d', { willReadFrequently: true });

  const BAYER = [[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
  const CELL = 3, DOT = 2;     // 격자·점 크기 (세밀)
  const GAIN = 2.2;            // 흐린 톤도 점으로 드러나게 증폭 (밀도)
  const VOID = '#07080D';      // 디더 패널 내부 = 주변보다 더 어둡게

  let W = 0, H = 0, dpr = 1;
  function resize() {
    const r = area.getBoundingClientRect();
    W = Math.max(2, Math.floor(r.width));
    H = Math.max(2, Math.floor(r.height));
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    cv.width = W * dpr; cv.height = H * dpr;
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  const DOT_GAIN = 2.4;   // dim 픽셀 최대 증폭 (밝은 픽셀은 색조 유지 위해 자동 제한)
  function dotColor(r, g, b) {
    const mx = r > g ? (r > b ? r : b) : (g > b ? g : b);
    if (mx <= 0) return 'rgb(0,0,0)';
    const f = Math.min(DOT_GAIN, 255 / mx);   // 가장 큰 채널이 255에 닿는 선까지만 → 흰색 클리핑 방지, 색 유지
    return 'rgb(' + ((r * f) | 0) + ',' + ((g * f) | 0) + ',' + ((b * f) | 0) + ')';
  }

  let last = 0;
  function loop(ts) {
    requestAnimationFrame(loop);
    if (ts - last < 33) return;   // ~30fps throttle
    last = ts;
    if (!W || !H) return;

    const cols = Math.ceil(W / CELL);
    const rows = Math.ceil(H / CELL);
    small.width = cols; small.height = rows;
    try { sctx.drawImage(src, 0, 0, cols, rows); }            // 장면을 셀 해상도로 평균
    catch (e) { return; }
    let data;
    try { data = sctx.getImageData(0, 0, cols, rows).data; }
    catch (e) { return; }

    ctx.fillStyle = VOID;
    ctx.fillRect(0, 0, W, H);

    for (let cy = 0; cy < rows; cy++) {
      const brow = BAYER[cy &amp; 3];
      for (let cx = 0; cx < cols; cx++) {
        const i = (cy * cols + cx) * 4;
        const r = data[i], g = data[i + 1], b = data[i + 2];
        const lum = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
        const t = (brow[cx &amp; 3] + 0.5) / 16;
        if (lum * GAIN > t) {                                  // 밝기 → 점 밀도
          ctx.fillStyle = dotColor(r, g, b);
          ctx.fillRect(cx * CELL, cy * CELL, DOT, DOT);        // 점 색 = 장면 색
        }
      }
    }
  }
  requestAnimationFrame(loop);
})();
</script>

<script>
// ── 네비게이션 (단독: 타이틀 파일로 / 통합: 부모로 postMessage) ──
function navTitle(){ if(window.parent!==window){window.parent.postMessage('nav:title','*');} else {window.location.href='title_v5.html';} }

// ── 팔레트·디더 상수 ──
const BAYER=[[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
let CELL=3,DOT=2; const GAIN=2.2,VOID='#07080D',DOT_GAIN=2.4;
const COOL=[156,197,230],WARM=[242,192,120],COND=[240,232,200],RED=[226,75,74];

const well=document.getElementById('well');
const cv=document.getElementById('dither'),ctx=cv.getContext('2d');
const linkSvg=document.getElementById('link-layer');

let W=0,H=0,cols=0,rows=0,src,sctx,sprinkle=[];
const neb={nx:0,ny:0,RX:0,RY:0,dx:0,dy:0,sx:0,sy:0};   // dx,dy = 불일치 점(src), sx,sy = 화면좌표
let discBoost=1;   // 행 선택 시 불일치 점 밝아짐

function dotColor(r,g,b){const mx=r>g?(r>b?r:b):(g>b?g:b);if(mx<=0)return'rgb(0,0,0)';const f=Math.min(DOT_GAIN,255/mx);return'rgb('+((r*f)|0)+','+((g*f)|0)+','+((b*f)|0)+')';}

function sizeNeb(){
  const b=well.getBoundingClientRect(); W=Math.max(2,b.width|0); H=Math.max(2,b.height|0);
  cv.width=W; cv.height=H;
  cols=Math.ceil(W/CELL); rows=Math.ceil(H/CELL);
  src=document.createElement('canvas'); src.width=cols; src.height=rows; sctx=src.getContext('2d');
  neb.nx=cols*0.5; neb.ny=rows*0.72; neb.RX=cols*0.43; neb.RY=rows*0.215;
  neb.dx=neb.nx; neb.dy=neb.ny+neb.RY*0.35;    // 불일치 점 — 콘솔 중앙 바로 아래, 우물 깊숙이
  if(sprinkle.length===0){
    for(let i=0;i<320;i++){const a=Math.random()*Math.PI*2;const r=Math.sqrt(Math.random());sprinkle.push({a,r,n:0.4+Math.random()*0.6,w:Math.random()});}
  }
}

function radial(cx,cy,rad,col,a){
  sctx.save(); sctx.translate(cx,cy); sctx.scale(1,neb.RY/neb.RX);
  const g=sctx.createRadialGradient(0,0,0,0,0,rad);
  g.addColorStop(0,`rgba(${col[0]},${col[1]},${col[2]},${a})`);
  g.addColorStop(1,`rgba(${col[0]},${col[1]},${col[2]},0)`);
  sctx.fillStyle=g; sctx.beginPath(); sctx.arc(0,0,rad,0,7); sctx.fill(); sctx.restore();
}

function renderNeb(t){
  const breathe=0.88+0.12*Math.sin(t/3200);
  sctx.globalCompositeOperation='source-over'; sctx.fillStyle=VOID; sctx.fillRect(0,0,cols,rows);
  sctx.globalCompositeOperation='lighter';
  radial(neb.nx,neb.ny,neb.RX*1.05,COOL,0.16*breathe);
  radial(neb.nx,neb.ny,neb.RX*0.62,WARM,0.20*breathe);
  radial(neb.nx,neb.ny,neb.RX*0.30,COND,0.30*breathe);
  const rot=t/26000;
  for(const p of sprinkle){
    const a=p.a+rot;
    const x=neb.nx+Math.cos(a)*p.r*neb.RX, y=neb.ny+Math.sin(a)*p.r*neb.RY;
    const depth=0.55+0.45*((y-(neb.ny-neb.RY))/(2*neb.RY));
    const br=(0.25+0.75*(1-p.r))*p.n*depth*breathe;
    const col=p.w<0.5?COOL:(p.w<0.85?WARM:COND);
    sctx.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${br})`; sctx.fillRect(x|0,y|0,1,1);
  }
  // 불일치 — 날카로운 빨강, 맥박. 선택 시 밝아지고, 기각 시 식어(차가운 톤) 사라짐
  discCool += (discCoolTarget - discCool) * 0.06;
  const dcol=[RED[0]+(COOL[0]-RED[0])*discCool, RED[1]+(COOL[1]-RED[1])*discCool, RED[2]+(COOL[2]-RED[2])*discCool];
  const pulse=(0.5+0.5*Math.sin(t/600))*discBoost*(1-0.55*discCool);
  radial(neb.dx,neb.dy,neb.RX*0.13,dcol,Math.min(1,0.95*pulse));
  sctx.fillStyle=`rgba(${dcol[0]|0},${dcol[1]|0},${dcol[2]|0},${Math.min(1,pulse)})`; sctx.fillRect(neb.dx|0,neb.dy|0,1,1);
  // 행↔글로우 드롭 라인 — 디더에 통합(3 셀 폭 빨강). 콘솔 아래에서 불일치 점으로 내려감
  if(linkActive){
    if(linkStartT===null) linkStartT=t;
    const pr=Math.min(1,(t-linkStartT)/700), eo=1-Math.pow(1-pr,3);
    const top=linkTopY, bot=top+(neb.dy-top)*eo;
    sctx.globalCompositeOperation='source-over';
    sctx.fillStyle=`rgba(${RED[0]},${RED[1]},${RED[2]},0.95)`;
    sctx.fillRect(Math.round(neb.dx)-1, Math.round(top), 3, Math.max(1,Math.round(bot-top)));
    sctx.globalCompositeOperation='lighter';
  }
  // 먼 쪽(위) 원근 감쇠 — 내려다봄
  sctx.globalCompositeOperation='source-over';
  const vg=sctx.createLinearGradient(0,neb.ny-neb.RY,0,neb.ny+neb.RY*0.3);
  vg.addColorStop(0,'rgba(7,8,13,0.55)'); vg.addColorStop(1,'rgba(7,8,13,0)');
  sctx.fillStyle=vg; sctx.fillRect(0,0,cols,rows);
  // 디더 패스
  const data=sctx.getImageData(0,0,cols,rows).data;
  ctx.fillStyle=VOID; ctx.fillRect(0,0,W,H);
  for(let cy=0;cy<rows;cy++){const brow=BAYER[cy&amp;3];for(let cx=0;cx<cols;cx++){
    const i=(cy*cols+cx)*4, r=data[i],g=data[i+1],b=data[i+2];
    const lum=(0.2126*r+0.7152*g+0.0722*b)/255;
    if(lum*GAIN>(brow[cx&amp;3]+0.5)/16){ ctx.fillStyle=dotColor(r,g,b); ctx.fillRect(cx*CELL,cy*CELL,DOT,DOT); }
  }}
  neb.sx=neb.dx*CELL; neb.sy=neb.dy*CELL;
}

// ── 행↔글로우 연결선 (디더 통합) ──
let linkActive=false, linkStartT=null, linkTopY=0;
function computeLinkTop(){
  const wb=well.getBoundingClientRect();
  const cb=document.getElementById('console').getBoundingClientRect();
  linkTopY=Math.max(0,(cb.bottom-wb.top)/CELL + 1);   // 콘솔 바로 아래 (src 좌표)
}

// ── 인터랙션 ──
let selected=false, terminal=false, reconfirmed=false, discCool=0, discCoolTarget=0;
function selectDisc(){
  if(terminal) return;
  const lower=document.getElementById('lower-rows');
  if(selected){ // 토글 닫기
    selected=false; discBoost=1; linkActive=false; linkStartT=null;
    document.getElementById('row-disc').classList.remove('selected'); document.getElementById('row-disc').classList.add('pulsing');
    document.getElementById('expand').classList.remove('open');
    if(lower) lower.style.display='';
    return;
  }
  selected=true; discBoost=1.9;
  const row=document.getElementById('row-disc');
  row.classList.remove('pulsing'); row.classList.add('selected');
  document.getElementById('expand').classList.add('open');
  if(lower) lower.style.display='none';            // 조사 중엔 콘솔을 상단에 컴팩트하게
  document.getElementById('guidance').classList.add('dismissed');
  setTimeout(()=>{ computeLinkTop(); linkStartT=null; linkActive=true; }, 220);  // 확장·접힘 안정 후 드롭 라인
}

function disableActions(){ ['btn-recheck','btn-dismiss','btn-escalate'].forEach(id=>document.getElementById(id).disabled=true); }
function showCompletion(meta,title,sub){
  document.querySelector('.completion .c-meta').textContent=meta;
  document.querySelector('.completion .c-title').textContent=title;
  document.querySelector('.completion .c-sub').textContent=sub;
  document.getElementById('completion').classList.add('visible');
}

// 방향 디더 빔 — 3셀 폭. (위로 상신 / 아래로 질의 / 응답 상승)
function dirBeam(cx0,startY,endY,col,dur,onDone){
  const fc=document.getElementById('flagCanvas'); if(!fc) return;
  fc.width=W; fc.height=H; const fctx=fc.getContext('2d');
  const tailH=66; let st=null;
  function fr(t){
    if(st===null) st=t;
    const p=Math.min(1,(t-st)/dur), eo=p*p;
    const peakY=startY+(endY-startY)*eo;
    fctx.clearRect(0,0,fc.width,fc.height);
    for(let y=0;y<H;y+=CELL){
      const vl=Math.max(0,1-Math.abs(y-peakY)/tailH); if(vl<=0) continue;
      const brow=BAYER[((y/CELL)|0)&amp;3];
      for(let k=-1;k<=1;k++){ const cx=cx0+k;
        if(vl>(brow[((cx%4)+4)%4]+0.5)/16){ fctx.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${vl.toFixed(2)})`; fctx.fillRect(cx*CELL,y,DOT,DOT); }
      }
    }
    if(p<1) requestAnimationFrame(fr); else { fctx.clearRect(0,0,fc.width,fc.height); if(onDone) onDone(); }
  }
  requestAnimationFrame(fr);
}

// 관장실로 상신 (위로) — 종료
function escalate(){
  if(terminal) return; terminal=true;
  disableActions(); document.getElementById('btn-escalate').textContent='상신됨';
  document.getElementById('disc-xval').innerHTML='<span class=&quot;badge sent&quot;>상신됨 · 14:32</span>';
  linkActive=false; linkStartT=null;
  dirBeam(Math.round(neb.dx), neb.sy, -90, RED, 1700);   // 데이터가 관장실로 상승
  setTimeout(()=>showCompletion('Escalation complete','검토 상신 완료','불일치가 관장실로 전달되었습니다 · 감리자의 검토가 기록됨'),1700);
}

// 기각 · 정상 처리 (닫기) — 종료. 점이 식어 차가운 톤으로
function dismiss(){
  if(terminal) return; terminal=true;
  disableActions(); document.getElementById('btn-dismiss').textContent='기각됨';
  document.getElementById('disc-xval').innerHTML='<span class=&quot;badge sent&quot;>정상 처리 · 기록됨</span>';
  document.getElementById('disc-risk').textContent='단일 출처';
  linkActive=false; linkStartT=null; discBoost=1; discCoolTarget=1;   // 빨강이 식음
  setTimeout(()=>showCompletion('Dismissed · recorded','정상 처리 완료','단일 출처 경보로 전환 · 감리자의 판단이 기록됨'),1500);
}

// 작업자에 재확인 요청 (아래로 질의 → 응답 상승) — 비종료
function requestReconfirm(){
  if(terminal||reconfirmed) return; reconfirmed=true;
  document.getElementById('btn-recheck').disabled=true;
  document.getElementById('btn-recheck').textContent='재확인 요청됨';
  linkActive=false; linkStartT=null;
  const cx0=Math.round(neb.dx);
  // 질의가 작업자에게 내려감 (차가운 빛)
  dirBeam(cx0, neb.sy, H+90, COOL, 1300, ()=>{
    setTimeout(()=>{
      // 작업자 재확인 응답이 위로 올라옴 (응축 빛)
      dirBeam(cx0, H+90, neb.sy, COND, 1300, ()=>{
        const n=document.getElementById('recheck-note');
        n.textContent='작업자 재확인 — 진동 재발생, 불일치 유지 (14:34)';
        n.classList.add('show');
        discBoost=2.2;   // 보강 — 점이 더 또렷
      });
    },450);
  });
}

// ── 루프 ──
sizeNeb();
let last=0;
function loop(t){ if(t-last>32){last=t; renderNeb(t);} requestAnimationFrame(loop); }
requestAnimationFrame(loop);
window.addEventListener('resize',()=>{ sizeNeb(); if(linkActive) computeLinkTop(); });

// 안내창 등장
setTimeout(()=>document.getElementById('guidance').classList.add('visible'),2600);

// ── 진입 오버레이 페이드 ──
(function scheduleEntryFade(){
  const o=document.getElementById('entryOverlay'); if(!o) return;
  setTimeout(()=>o.classList.add('fading-out'),1500);
  setTimeout(()=>o.classList.add('gone'),2700);
})();

// ── 진입 매개 — 디더 빛 빔 ──
(function entryDitherBeam(){
  const cvb=document.getElementById('entryBeam'), ov=document.getElementById('entryOverlay');
  if(!cvb||!ov) return; const bctx=cvb.getContext('2d');
  const CELL2=3,DOT2=2,DUR=1500; let BW=0,BH=0;
  (function size(){const r=ov.getBoundingClientRect();BW=Math.max(2,r.width|0);BH=Math.max(2,r.height|0);
    const dpr=Math.min(window.devicePixelRatio||1,2);cvb.width=BW*dpr;cvb.height=BH*dpr;cvb.style.width=BW+'px';cvb.style.height=BH+'px';bctx.setTransform(dpr,0,0,dpr,0,0);})();
  let start=null;
  function frame(ts){ if(start===null)start=ts; const p=Math.min(1,(ts-start)/DUR);
    const peakY=(-0.12+1.24*p)*BH, cx=BW/2, beamW=Math.max(60,BW*0.09), tailH=BH*0.34;
    bctx.clearRect(0,0,BW,BH);
    for(let y=0;y<BH;y+=CELL2){const vl=Math.max(0,1-Math.abs(y-peakY)/tailH); if(vl<=0)continue;
      const brow=BAYER[((y/CELL2)|0)&amp;3];
      for(let x=0;x<BW;x+=CELL2){const dx=Math.abs(x-cx)/beamW; const lum=vl*Math.max(0,1-dx*dx); if(lum<=0)continue;
        if(lum>(brow[((x/CELL2)|0)&amp;3]+0.5)/16){const bb=Math.min(255,(lum*300)|0);
          bctx.fillStyle='rgb('+bb+','+Math.min(255,(bb*0.95)|0)+','+Math.min(255,(bb*0.80)|0)+')'; bctx.fillRect(x,y,DOT2,DOT2);}}}
    if(p<1) requestAnimationFrame(frame); else bctx.clearRect(0,0,BW,BH);
  }
  requestAnimationFrame(frame);
})();
</script>

</style>

<script>
function navTitle(){ if(window.parent!==window){window.parent.postMessage('nav:title','*');} else {window.location.href='title_v5.html';} }

const BAYER=[[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
let CELL=3,DOT=2; const GAIN=2.2,VOID='#07080D',DOT_GAIN=2.4;
const COOL=[156,197,230],WARM=[242,192,120],COND=[240,232,200],RED=[226,75,74],AMBER=[239,159,39];

const well=document.getElementById('well');
const cv=document.getElementById('dither'),ctx=cv.getContext('2d');

let W=0,H=0,cols=0,rows=0,src,sctx,sprinkle=[];
const sp={};            // 척추 기하 (src 좌표)
let cmdReach=null;      // 하달이 작업자에 닿았을 때 색 (worker tint)

function dotColor(r,g,b){const mx=r>g?(r>b?r:b):(g>b?g:b);if(mx<=0)return'rgb(0,0,0)';const f=Math.min(DOT_GAIN,255/mx);return'rgb('+((r*f)|0)+','+((g*f)|0)+','+((b*f)|0)+')';}

function sizeNeb(){
  const b=well.getBoundingClientRect(); W=Math.max(2,b.width|0); H=Math.max(2,b.height|0);
  cv.width=W; cv.height=H;
  cols=Math.ceil(W/CELL); rows=Math.ceil(H/CELL);
  src=document.createElement('canvas'); src.width=cols; src.height=rows; sctx=src.getContext('2d');
  sp.x=cols*0.5;
  sp.supY=rows*0.52; sp.nebY=rows*0.67; sp.workY=rows*0.88;
  sp.RX=cols*0.36; sp.RY=rows*0.13;
  sp.dx=sp.x+sp.RX*0.12; sp.dy=sp.nebY-sp.RY*0.10;     // 상신된 빨강 사건
  sp.workers=[]; const n=7; for(let i=0;i<n;i++){const tt=(i-(n-1)/2)/((n-1)/2); sp.workers.push({x:sp.x+tt*sp.RX*0.85, hot:i===2});}
  if(sprinkle.length===0){ for(let i=0;i<260;i++){const a=Math.random()*Math.PI*2;const r=Math.sqrt(Math.random());sprinkle.push({a,r,n:0.4+Math.random()*0.6,w:Math.random()});} }
  placeTags();
}

function consoleBottomSrc(){
  const wb=well.getBoundingClientRect(), cb=document.getElementById('console').getBoundingClientRect();
  return Math.max(0,(cb.bottom-wb.top)/CELL + 1);
}
function placeTags(){
  const px=v=>v*CELL; const lx=px(sp.x+cols*0.12);
  const t1=document.getElementById('tag-sup'),t2=document.getElementById('tag-neb'),t3=document.getElementById('tag-work');
  t1.style.left=lx+'px'; t1.style.top=px(sp.supY)+'px';
  t2.style.left=lx+'px'; t2.style.top=px(sp.nebY)+'px';
  t3.style.left=lx+'px'; t3.style.top=px(sp.workY)+'px';
}

function radial(cx,cy,rad,col,a,squash){
  sctx.save(); sctx.translate(cx,cy); sctx.scale(1,squash||1);
  const g=sctx.createRadialGradient(0,0,0,0,0,rad);
  g.addColorStop(0,`rgba(${col[0]},${col[1]},${col[2]},${a})`);
  g.addColorStop(1,`rgba(${col[0]},${col[1]},${col[2]},0)`);
  sctx.fillStyle=g; sctx.beginPath(); sctx.arc(0,0,rad,0,7); sctx.fill(); sctx.restore();
}

function renderNeb(t){
  const breathe=0.88+0.12*Math.sin(t/3200);
  const cby=consoleBottomSrc();
  sctx.globalCompositeOperation='source-over'; sctx.fillStyle=VOID; sctx.fillRect(0,0,cols,rows);
  sctx.globalCompositeOperation='lighter';
  // 척추선 — L4(콘솔 아래) → L1, 희미하게
  sctx.fillStyle='rgba(240,232,200,0.10)'; sctx.fillRect(Math.round(sp.x), Math.round(cby), 1, Math.max(1,Math.round(sp.workY-cby)));
  // L2 교차검증 성운
  radial(sp.x,sp.nebY,sp.RX*1.0,COOL,0.15*breathe,sp.RY/sp.RX);
  radial(sp.x,sp.nebY,sp.RX*0.55,WARM,0.18*breathe,sp.RY/sp.RX);
  radial(sp.x,sp.nebY,sp.RX*0.28,COND,0.26*breathe,sp.RY/sp.RX);
  const rot=t/26000;
  for(const p of sprinkle){const a=p.a+rot;const x=sp.x+Math.cos(a)*p.r*sp.RX;const y=sp.nebY+Math.sin(a)*p.r*sp.RY;const br=(0.25+0.75*(1-p.r))*p.n*breathe;const col=p.w<0.5?COOL:(p.w<0.85?WARM:COND);sctx.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${br})`;sctx.fillRect(x|0,y|0,1,1);}
  // L3 감리자 노드
  radial(sp.x,sp.supY,sp.RX*0.16,COND,0.62*breathe);
  sctx.fillStyle=`rgba(${COND[0]},${COND[1]},${COND[2]},1)`; sctx.fillRect(sp.x|0,sp.supY|0,1,1);
  // L1 작업자열 (멀고 작게). 하달이 닿으면 cmdReach 색으로 물듦
  for(const w of sp.workers){
    const base=w.hot?AMBER:COOL; const col=cmdReach||base;
    radial(w.x,sp.workY,sp.RX*0.05,col,(cmdReach?0.7:0.45)*breathe);
    sctx.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${cmdReach?0.9:0.7})`; sctx.fillRect(w.x|0,sp.workY|0,1,1);
  }
  // 상신된 빨강 사건 (성운 안)
  const pulse=0.55+0.45*Math.sin(t/600);
  radial(sp.dx,sp.dy,sp.RX*0.11,RED,0.85*pulse);
  sctx.fillStyle=`rgba(${RED[0]},${RED[1]},${RED[2]},${pulse})`; sctx.fillRect(sp.dx|0,sp.dy|0,1,1);
  // 도달 경로 — 빨강 사건에서 콘솔까지 희미한 빨강 실 (이미 올라온 길)
  sctx.globalCompositeOperation='source-over';
  sctx.fillStyle='rgba(226,75,74,0.28)'; sctx.fillRect(Math.round(sp.dx), Math.round(cby), 1, Math.max(1,Math.round(sp.dy-cby)));
  // 먼 아래(현장) 약한 감쇠 — 정점에서 멀어짐
  const vg=sctx.createLinearGradient(0,sp.workY+sp.RY,0,sp.nebY);
  vg.addColorStop(0,'rgba(7,8,13,0.42)'); vg.addColorStop(1,'rgba(7,8,13,0)');
  sctx.fillStyle=vg; sctx.fillRect(0,0,cols,rows);
  // 디더
  const data=sctx.getImageData(0,0,cols,rows).data;
  ctx.fillStyle=VOID; ctx.fillRect(0,0,W,H);
  for(let cy=0;cy<rows;cy++){const brow=BAYER[cy&amp;3];for(let cx=0;cx<cols;cx++){
    const i=(cy*cols+cx)*4, r=data[i],g=data[i+1],b=data[i+2];
    const lum=(0.2126*r+0.7152*g+0.0722*b)/255;
    if(lum*GAIN>(brow[cx&amp;3]+0.5)/16){ ctx.fillStyle=dotColor(r,g,b); ctx.fillRect(cx*CELL,cy*CELL,DOT,DOT); }
  }}
  // 화면 좌표 캐시
  sp.supSY=sp.supY*CELL; sp.nebSY=sp.nebY*CELL; sp.workSY=sp.workY*CELL; sp.cbSY=cby*CELL;
}

// 방향 디더 빔 — 3셀 폭. 판정 하달(아래로)
function dirBeam(cx0,startY,endY,col,dur,onDone){
  const fc=document.getElementById('beamCanvas'); if(!fc) return;
  fc.width=W; fc.height=H; const fctx=fc.getContext('2d');
  const tailH=72; let st=null;
  function fr(t){
    if(st===null) st=t;
    const p=Math.min(1,(t-st)/dur), eo=p*p;
    const peakY=startY+(endY-startY)*eo;
    fctx.clearRect(0,0,fc.width,fc.height);
    for(let y=0;y<H;y+=CELL){
      const vl=Math.max(0,1-Math.abs(y-peakY)/tailH); if(vl<=0) continue;
      const brow=BAYER[((y/CELL)|0)&amp;3];
      for(let k=-1;k<=1;k++){ const cx=cx0+k;

// 반려 — 감리자(L3)에게만 되돌림 (추가 검토)

}

sizeNeb();
let last=0;

requestAnimationFrame(loop);

(function(){ const o=document.getElementById('entryOverlay'); if(!o) return;

(function entryDitherBeam(){

  function frame(ts){ if(start===null)start=ts; const p=Math.min(1,(ts-start)/DUR);

      for(let x=0;x<BW;x+=CELL2){const dx=Math.abs(x-cx)/beamW; const lum=vl*Math.max(0,1-dx*dx); if(lum<=0)continue;

      sctx.fillStyle=`rgba(${COOL[0]},${COOL[1]},${COOL[2]},${b*0.7})`; sctx.fillRect(x|0,rowY|0,1,1);

// 인덱스 행 선택 → 서고 위치 강조 (열람 전용, 상태 변경 없음)
(function(){

<script>
function navTitle(){ if(window.parent!==window){window.parent.postMessage('nav:title','*');} else {window.location.href='title_v5.html';} }

const BAYER=[[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
let CELL=3,DOT=2; const GAIN=2.2,VOID='#07080D',DOT_GAIN=2.4;
const COOL=[156,197,230],WARM=[242,192,120],COND=[240,232,200],AMBER=[239,159,39],RED=[226,75,74];

const well=document.getElementById('well');
const cv=document.getElementById('dither'),ctx=cv.getContext('2d');

const seq=['A','ORC','D','B','EXIT'];
const orch={startT:null, p:0, phase:0, f:0};

}

  const m={'lbl-A':'A','lbl-C':'C','lbl-ORC':'ORC','lbl-D':'D','lbl-B':'B','lbl-EXIT':'EXIT'};
  for(const id in m){ const p=N[m[id]]; const e=document.getElementById(id); e.style.left=(p[0]*CELL)+'px'; e.style.top=(p[1]*CELL-24)+'px'; }

let lastPhase=-1;
function syncConsole(){
  const lis=document.querySelectorAll('#steps li');
  lis.forEach(li=>{const s=+li.dataset.s; li.classList.toggle('active',s===orch.phase); li.classList.toggle('done',s<orch.phase);});
  const note=document.getElementById('orcNote');
  note.textContent = orch.p>=1 ? '조율 완료 · 관장실로 상신됨' : '조율 진행 중…';

function render(t){
  if(orchReady){ if(orch.startT===null) orch.startT=t; orch.p=Math.min(1,(t-orch.startT)/DUR); }
  else { orch.p=0; }
  const pp=orch.p*5; orch.phase=Math.min(4,Math.floor(pp)); orch.f=pp-orch.phase;
  syncConsole();

  const breathe=0.85+0.15*Math.sin(t/2600);

  sctx.globalCompositeOperation='lighter';
  // 토폴로지 엣지 (옅게)
  edge('A','ORC',COND,0.12); edge('C','ORC',COND,0.12); edge('ORC','D',COND,0.12); edge('D','B',COND,0.12); edge('B','EXIT',COND,0.12);
  if(orch.phase===1) edge('C','ORC',COOL,0.42);     // C 센서 대조 입력 강조

  // 활성도
  const act={A:0,C:0,ORC:0,D:0,B:0,EXIT:0};
  const a=seq[orch.phase], b=seq[Math.min(4,orch.phase+1)];
  act[a]=1; act[b]=Math.max(act[b],orch.f);
  if(orch.phase===1) act.C=1;
  if(orch.p>=1){ act.EXIT=1; }

  for(const k of ['A','C','ORC','D','B']){
    let col=COOL; if(k==='ORC')col=COND; if(k==='D'&amp;&amp;orch.phase===2)col=RED;
    glow(N[k][0],N[k][1],col,(0.26+0.62*act[k])*breathe,7+act[k]*4);
  }
  glow(N.EXIT[0],N.EXIT[1],COND,(0.2+0.6*act.EXIT)*breathe,6+act.EXIT*4);

  // 패킷
  const A=N[a],B=N[b]; const px=A[0]+(B[0]-A[0])*ease(orch.f), py=A[1]+(B[1]-A[1])*ease(orch.f);
  let pcol=COND; if(orch.phase===2)pcol=RED; if(orch.phase===0)pcol=AMBER;
  if(orch.p<1) glow(px,py,pcol,0.95,9);

  // 디더
  const data=sctx.getImageData(0,0,cols,rows).data; ctx.fillStyle=VOID; ctx.fillRect(0,0,W,H);
  for(let cy=0;cy<rows;cy++){const brow=BAYER[cy&amp;3];for(let cx=0;cx<cols;cx++){
    const idx=(cy*cols+cx)*4, r=data[idx],g=data[idx+1],bl=data[idx+2];
    const lum=(0.2126*r+0.7152*g+0.0722*bl)/255;
    if(lum*GAIN>(brow[cx&amp;3]+0.5)/16){ ctx.fillStyle=dotColor(r,g,bl); ctx.fillRect(cx*CELL,cy*CELL,DOT,DOT); }
  }}

  // 노드 라벨 활성 표시
  updateLabel('lbl-A',act.A); updateLabel('lbl-C',act.C); updateLabel('lbl-ORC',act.ORC);
  updateLabel('lbl-D',act.D, orch.phase===2); updateLabel('lbl-B',act.B); updateLabel('lbl-EXIT',act.EXIT);
}
function updateLabel(id,on,danger){const e=document.getElementById(id);e.classList.toggle('act',on>0.3&amp;&amp;!danger);e.classList.toggle('dact',!!danger&amp;&amp;on>0.3);}

function replayOrch(){ orch.startT=null; orchReady=true; lastPhase=-1; }

sizeNeb();
let last=0;
function loop(t){ if(t-last>32){last=t; render(t);} requestAnimationFrame(loop); }
requestAnimationFrame(loop);
window.addEventListener('resize',()=>{ sizeNeb(); });
setTimeout(()=>{ orchReady=true; orch.startT=null; lastPhase=-1; }, 2800);   // 진입 페이드 후 조율 시작

setTimeout(()=>document.getElementById('guidance').classList.add('visible'),2600);

(function(){ const o=document.getElementById('entryOverlay'); if(!o) return;
  setTimeout(()=>o.classList.add('fading-out'),1500); setTimeout(()=>o.classList.add('gone'),2700); })();

(function entryDitherBeam(){
  const cvb=document.getElementById('entryBeam'), ov=document.getElementById('entryOverlay'); if(!cvb||!ov) return;
  const bctx=cvb.getContext('2d'); const CELL2=3,DOT2=2,DUR2=1500; let BW=0,BH=0;
  (function size(){const r=ov.getBoundingClientRect();BW=Math.max(2,r.width|0);BH=Math.max(2,r.height|0);
    const dpr=Math.min(window.devicePixelRatio||1,2);cvb.width=BW*dpr;cvb.height=BH*dpr;cvb.style.width=BW+'px';cvb.style.height=BH+'px';bctx.setTransform(dpr,0,0,dpr,0,0);})();
  let start=null;
  function frame(ts){ if(start===null)start=ts; const p=Math.min(1,(ts-start)/DUR2);
    const peakY=(-0.12+1.24*p)*BH, cx=BW/2, beamW=Math.max(60,BW*0.09), tailH=BH*0.34;
    bctx.clearRect(0,0,BW,BH);
    for(let y=0;y<BH;y+=CELL2){const vl=Math.max(0,1-Math.abs(y-peakY)/tailH); if(vl<=0)continue;
      const brow=BAYER[((y/CELL2)|0)&amp;3];
      for(let x=0;x<BW;x+=CELL2){const dx=Math.abs(x-cx)/beamW; const lum=vl*Math.max(0,1-dx*dx); if(lum<=0)continue;
        if(lum>(brow[((x/CELL2)|0)&amp;3]+0.5)/16){const bb=Math.min(255,(lum*300)|0);
          bctx.fillStyle='rgb('+bb+','+Math.min(255,(bb*0.95)|0)+','+Math.min(255,(bb*0.80)|0)+')'; bctx.fillRect(x,y,DOT2,DOT2);}}}
    if(p<1) requestAnimationFrame(frame); else bctx.clearRect(0,0,BW,BH);
  }
  requestAnimationFrame(frame);
})();
</script>

<script>
  var frames = { title:document.getElementById('f-title'), worker:document.getElementById('f-worker'),
    supervisor:document.getElementById('f-supervisor'), director:document.getElementById('f-director'),
    stacks:document.getElementById('f-stacks'), catalog:document.getElementById('f-catalog') };
  function show(which){ var t=frames[which]; if(!t) return; t.srcdoc=t.dataset.doc; t.classList.add('active');
    Object.keys(frames).forEach(function(k){ if(k!==which){ var f=frames[k]; f.classList.remove('active'); setTimeout(function(){ f.removeAttribute('srcdoc'); },700);} }); }
  window.addEventListener('message', function(e){
    if(e.data==='nav:worker')show('worker'); else if(e.data==='nav:supervisor')show('supervisor');
    else if(e.data==='nav:director')show('director'); else if(e.data==='nav:stacks')show('stacks');
    else if(e.data==='nav:catalog')show('catalog'); else if(e.data==='nav:title')show('title'); });
  frames.title.srcdoc=frames.title.dataset.doc;
</script></body></html>
