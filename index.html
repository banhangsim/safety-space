          2. Apply 10° Z-tilt (around screen origin)
          3. Project to 2D screen with simple perspective

<script>
function enterChapter(role, koName) {
  const stage = document.querySelector('.stage');
  stage.classList.add('zoom-' + role);
  // small delay so zoom begins before fade
  setTimeout(() => stage.classList.add('zooming'), 80);

  // ── 작업자 화면은 별도 문서로 구현됨 — 줌 의례 후 이동 ──
  // (감리자/소장은 아직 미구현이라 placeholder 유지)
  if (role === 'worker') {
    setTimeout(() => {
      if (window.parent !== window) window.parent.postMessage('nav:worker', '*');
      else window.location.href = 'worker_chamber.html';
    }, 1000);
    return;
  }

  if (role === 'supervisor') {
    setTimeout(() => {
      if (window.parent !== window) window.parent.postMessage('nav:supervisor', '*');
      else window.location.href = 'supervisor_chamber.html';
    }, 1000);
    return;
  }

  if (role === 'director') {
    setTimeout(() => {
      if (window.parent !== window) window.parent.postMessage('nav:director', '*');
      else window.location.href = 'director_office.html';
    }, 1000);
    return;
  }

  if (role === 'catalog') {
    setTimeout(() => {
      if (window.parent !== window) window.parent.postMessage('nav:catalog', '*');
      else window.location.href = 'catalog_room.html';
    }, 1000);
    return;
  }

  if (role === 'stacks') {
    setTimeout(() => {
      if (window.parent !== window) window.parent.postMessage('nav:stacks', '*');
      else window.location.href = 'stacks_archive.html';
    }, 1000);
    return;
  }

  document.getElementById('chapterRole').textContent = koName;
  setTimeout(() => {
    document.getElementById('nextChapter').classList.add('visible');
  }, 700);
}
function exitChapter() {
  const stage = document.querySelector('.stage');
  document.getElementById('nextChapter').classList.remove('visible');
  setTimeout(() => {
    stage.classList.remove('zooming');
    stage.classList.remove('zoom-worker', 'zoom-supervisor', 'zoom-director');
  }, 400);
}
</script>

<script>
const SVG_NS = 'http://www.w3.org/2000/svg';
const systemGlow = document.getElementById('system-glow');
const systemCrisp = document.getElementById('system-crisp');
const cosmosSvg = document.querySelector('svg.cosmos');
const hsCatalog = document.getElementById('hs-catalog');
const hsStacks  = document.getElementById('hs-stacks');
function placeHotspot(el, vx, vy, vw, vh){
  if(!el || !cosmosSvg) return;
  const m = cosmosSvg.getScreenCTM(); if(!m) return;
  const p = cosmosSvg.createSVGPoint();
  p.x = vx; p.y = vy; const a = p.matrixTransform(m);
  p.x = vx + vw; p.y = vy + vh; const b = p.matrixTransform(m);
  el.style.left   = Math.min(a.x, b.x) + 'px';
  el.style.top    = Math.min(a.y, b.y) + 'px';
  el.style.width  = Math.abs(b.x - a.x) + 'px';
  el.style.height = Math.abs(b.y - a.y) + 'px';
}

// 라벨 박스 — 텍스트 뒤에 어두운 박스를 깔아 어떤 배경 위에서도 또렷하게
const _measCv = document.createElement('canvas');
const _measCtx = _measCv.getContext('2d');
function labelBox(x, y, text, size, fill, anchor, ls) {
  ls = ls || 0;
  _measCtx.font = '300 ' + size + 'px Inter, Pretendard, sans-serif';
  const w = _measCtx.measureText(text).width + Math.max(0, text.length - 1) * size * ls;
  const padX = 6, padY = 3.5;
  const rx = (anchor === 'middle') ? (x - w / 2 - padX) : (x - padX);
  const ry = y - size + 1.5 - padY;
  const a = (anchor === 'middle') ? ' text-anchor=&quot;middle&quot;' : '';
  return `<rect x=&quot;${rx.toFixed(1)}&quot; y=&quot;${ry.toFixed(1)}&quot; width=&quot;${(w + padX * 2).toFixed(1)}&quot; height=&quot;${(size + padY * 2).toFixed(1)}&quot; fill=&quot;rgba(6,7,11,0.84)&quot; stroke=&quot;rgba(180,178,169,0.18)&quot; stroke-width=&quot;0.6&quot;/>`
       + `<text x=&quot;${x.toFixed(1)}&quot; y=&quot;${y.toFixed(1)}&quot;${a} fill=&quot;${fill}&quot; font-size=&quot;${size}&quot; letter-spacing=&quot;${ls}em&quot;>${text}</text>`;
}

/* ═════════════════════════════════════════════════════
   3D PROJECTION
   ═════════════════════════════════════════════════════ */

const SCREEN_CX = 600;
const SCREEN_CY = 400;
const TILT_DEG = 10;
const TILT_RAD = TILT_DEG * Math.PI / 180;
const COS_T = Math.cos(TILT_RAD);
const SIN_T = Math.sin(TILT_RAD);

// Perspective: items farther away (negative z, after Y-rotation) appear smaller/dimmer.
// We use a simple scale: scale = FOCAL / (FOCAL - z)
const FOCAL = 1200;

/**
 * Project a 3D world point to 2D screen coordinates.
 * The system's vertical spine (y axis) is TILTED 10° from screen vertical,
 * and rotation happens around this TILTED axis. So a point on the spine
 * (x=0, z=0, y!=0) traces a small circle as the system rotates.
 *
 * Implementation order (critical):
 *   1. Rotate the world around the world Y axis by `yaw`
 *   2. Then tilt the entire result around the screen Z axis by 10°
 * Because tilt is applied AFTER yaw, points on the world Y axis (x=0,z=0)
 * stay on the world Y axis after yaw, but get tilted off-vertical after tilt
 * — and as yaw changes, the spine itself rotates around the screen Z axis,
 * causing top/bottom points to trace circles.
 *
 * Wait — that's wrong. If yaw is around world Y and tilt is around screen Z,
 * a point at (0, 280, 0) is invariant under yaw (since y-axis rotation leaves
 * y-axis points fixed). Then tilt rotates it to a single tilted position.
 * As yaw changes, this point doesn't move at all.
 *
 * To make the spine itself rotate (precession), we need to tilt FIRST, then
 * rotate around the original world Y axis. After tilt, the tilted spine
 * (originally world Y) is no longer aligned with world Y — so rotating around
 * world Y now sweeps the tilted spine around in a cone. This is precession.
 *
 * Corrected order:
 *   1. Tilt around screen Z by 10° (spine becomes tilted)
 *   2. Rotate around the WORLD Y axis (the original vertical) by yaw
 *      — this sweeps the tilted spine in a cone
 */
function project(x, y, z, yaw) {
  // 1. Tilt around screen Z axis (rotate (x, y) by TILT_RAD)
  // World y is &quot;up&quot; in our system. SVG screen y is down — we'll flip at the end.
  // Tilt rotates the world around the world-Z (which we treat as screen-Z).
  // So a point at (0, 280, 0) goes to (0*cos - 280*sin, 0*sin + 280*cos, 0)
  // = (-280*sin(TILT), 280*cos(TILT), 0)
  const x1 = x * COS_T - y * SIN_T;
  const y1 = x * SIN_T + y * COS_T;
  const z1 = z;

  // 2. Rotate around the WORLD Y axis (which after tilt is no longer the spine)
  // The world Y axis in the original frame is just the screen-vertical direction.
  // After step 1, the spine is tilted, but we still rotate around the original
  // world Y direction (which in our coordinates is just the y-up direction
  // before tilt — but we've already mixed x and y. We treat this as rotation
  // around the (0,1,0) axis in the *post-tilt* frame for simplicity, which
  // gives precession effect.)
  //
  // Standard Y-axis rotation: x' = x*cos + z*sin, z' = -x*sin + z*cos
  const cy_ = Math.cos(yaw);
  const sy_ = Math.sin(yaw);
  const x2 = x1 * cy_ + z1 * sy_;
  const z2 = -x1 * sy_ + z1 * cy_;
  const y2 = y1;

  // 3. Project to screen (SVG y goes down, so flip y)
  const screenY_world = -y2;
  const scale = FOCAL / (FOCAL - z2);

  const sx = SCREEN_CX + x2 * scale;
  const sy = SCREEN_CY + screenY_world * scale;

  return { sx, sy, scale, depth: z2 };
}

/* ═════════════════════════════════════════════════════
   ELEMENTS
   Each element is drawn fresh each frame.
   We sort by depth (z1) so back elements render first.
   ═════════════════════════════════════════════════════ */

const ROTATION_PERIOD_MS = 60000;
const NUM_WORKERS = 7;
const ANOMALY_IDX = 4;

// Worker orbit: ring of radius 380, at world y=-240
const ORBIT_RADIUS = 380;
const ORBIT_Y = -240;

// Nebula disk: at world y=0, extends in xz plane with radius 380, very thin in y
const NEBULA_RADIUS = 380;
const NEBULA_THICKNESS = 30;  // y extent of the disk (very thin)

// Hierarchy nodes (on the spine, no rotation since they're on Y axis)
const SUPERVISOR_Y = 160;
const DIRECTOR_Y = 280;

// Nebula particles (in disk: x²+z² ≤ R², |y| ≤ THICKNESS/2)
const NEBULA_PARTICLE_COUNT = 110;
const nebulaParticles = [];

function randomNebulaParticle() {
  // distribute on disk, biased toward center
  const angle = Math.random() * Math.PI * 2;
  const r = Math.pow(Math.random(), 1.4) * (NEBULA_RADIUS - 10);
  const x = r * Math.cos(angle);
  const z = r * Math.sin(angle);
  const y = (Math.random() - 0.5) * NEBULA_THICKNESS;

  const colorRoll = Math.random();
  let color;
  if (colorRoll < 0.55) color = '#F2C078';       // warm amber (most common)
  else if (colorRoll < 0.80) color = '#9CC5E6';  // cool blue
  else if (colorRoll < 0.95) color = '#F5D89A';  // pale gold
  else color = '#E8A458';                          // deeper amber

  return {
    x, y, z,
    vx: (Math.random() - 0.5) * 0.12,
    vy: (Math.random() - 0.5) * 0.04,
    vz: (Math.random() - 0.5) * 0.12,
    color,
    sizeBase: 0.8 + Math.random() * 1.4,
    opacityBase: 0.45 + Math.random() * 0.45,
    phasePulse: Math.random() * Math.PI * 2,
    pulseSpeed: 0.7 + Math.random() * 1.4,
  };
}

for (let i = 0; i < NEBULA_PARTICLE_COUNT; i++) {
  nebulaParticles.push(randomNebulaParticle());
}

// Pulsar position (in nebula, fixed)
const pulsar = { x: -120, y: 0, z: 80 };

// Beam particles from workers to nebula
const beamParticles = [];
let lastEmit = 0;
const EMIT_INTERVAL = 700;
const BEAM_LIFETIME = 2400;

// Refined-up particles (nebula → supervisor → director)
const refinedParticles = [];
let lastRefinedEmit = 0;
const REFINED_INTERVAL = 2200;
const REFINED_LIFETIME = 3600;

/* ═════════════════════════════════════════════════════
   RENDER LOOP
   ═════════════════════════════════════════════════════ */

const t0 = performance.now();

function render(now) {
  const elapsed = now - t0;
  const yaw = (elapsed / ROTATION_PERIOD_MS) * 2 * Math.PI;

  // Collect all renderables with their depth, then sort
  const renderables = [];

  // ── 1. Nebula volumetric haze (drawn first, behind everything in the disk) ──
  // Project the nebula center; haze is rendered as multiple ellipses at depth=center
  const nebCenter = project(0, 0, 0, yaw);
  // The disk has slight thickness; we draw 3 stacked haze layers:
  // outer cool, middle warm, inner bright — all centered on nebCenter,
  // with sizes that scale with the projection to maintain world-size feel.
  // Aspect ratio: in screen space, the disk is foreshortened by depth viewing angle.
  // Since the disk is in the xz plane and we tilt by 10°, the disk's ry on screen
  // is roughly NEBULA_RADIUS * sin(TILT) = 380 * sin(10°) ≈ 66, plus a bit.
  // We compute the actual projected bounds by sampling.
  const hazeRX = NEBULA_RADIUS * nebCenter.scale * 1.0;
  const hazeRY = NEBULA_RADIUS * nebCenter.scale * Math.abs(SIN_T) + 30; // tilt-foreshortened + thickness
  renderables.push({
    type: 'haze-cool',
    cx: nebCenter.sx, cy: nebCenter.sy,
    rx: hazeRX * 1.05, ry: hazeRY * 1.5,
    depth: -800,
  });
  renderables.push({
    type: 'haze-warm-mid',
    cx: nebCenter.sx, cy: nebCenter.sy,
    rx: hazeRX * 0.78, ry: hazeRY * 1.2,
    depth: -795,
  });
  renderables.push({
    type: 'haze-warm-core',
    cx: nebCenter.sx, cy: nebCenter.sy,
    rx: hazeRX * 0.5, ry: hazeRY * 0.85,
    depth: -790,
  });
  renderables.push({
    type: 'haze-bright',
    cx: nebCenter.sx, cy: nebCenter.sy,
    rx: hazeRX * 0.25, ry: hazeRY * 0.5,
    depth: -785,
  });

  // ── 2. Nebula particles ──
  for (const p of nebulaParticles) {
    // drift
    p.x += p.vx;
    p.y += p.vy;
    p.z += p.vz;

    // gentle pull to center within disk
    p.vx += -p.x * 0.000018;
    p.vz += -p.z * 0.000018;
    p.vy += -p.y * 0.0001;

    // damping
    p.vx *= 0.994; p.vy *= 0.994; p.vz *= 0.994;

    // bounds: respawn if drifts out
    const distXZ = Math.sqrt(p.x * p.x + p.z * p.z);
    if (distXZ > NEBULA_RADIUS - 5 || Math.abs(p.y) > NEBULA_THICKNESS / 2 + 10 || Math.random() < 0.0005) {
      const np = randomNebulaParticle();
      Object.assign(p, np);
      continue;
    }

    const proj = project(p.x, p.y, p.z, yaw);
    const pulse = 0.65 + 0.35 * Math.sin(elapsed / 1000 * p.pulseSpeed + p.phasePulse);
    renderables.push({
      type: 'circle',
      cx: proj.sx, cy: proj.sy,
      r: p.sizeBase * proj.scale,
      fill: p.color,
      opacity: p.opacityBase * pulse * Math.min(1, proj.scale),
      depth: proj.depth,
    });
  }

  // ── 2. Pulsar (red, born of collision) ──
  const pProj = project(pulsar.x, pulsar.y, pulsar.z, yaw);
  // halo
  renderables.push({
    type: 'pulsar-halo',
    cx: pProj.sx, cy: pProj.sy,
    r: 18 * pProj.scale,
    depth: pProj.depth - 0.1,  // halo behind dot
  });
  // dot
  renderables.push({
    type: 'pulsar-dot',
    cx: pProj.sx, cy: pProj.sy,
    r: 2.5 * pProj.scale,
    depth: pProj.depth,
  });

  // ── 3. Workers (on tilted orbit, rotating with yaw) ──
  const workerProjs = [];
  for (let i = 0; i < NUM_WORKERS; i++) {
    const phase = (i / NUM_WORKERS) * 2 * Math.PI;
    // worker at world (R*cos(phase), ORBIT_Y, R*sin(phase)) — yaw applied in project()
    const wx = ORBIT_RADIUS * Math.cos(phase);
    const wz = ORBIT_RADIUS * Math.sin(phase);
    const wy = ORBIT_Y;
    const proj = project(wx, wy, wz, yaw);
    workerProjs.push({ proj, isAnomaly: i === ANOMALY_IDX, idx: i });

    // halo
    renderables.push({
      type: 'worker-halo',
      cx: proj.sx, cy: proj.sy,
      r: 20 * proj.scale,
      depth: proj.depth - 0.2,
    });
    // capsule ring
    renderables.push({
      type: 'worker-ring',
      cx: proj.sx, cy: proj.sy,
      r: 10 * proj.scale,
      stroke: i === ANOMALY_IDX ? 'rgba(239,159,39,0.6)' : 'rgba(232,230,221,0.4)',
      depth: proj.depth,
    });
    // dot
    renderables.push({
      type: 'worker-dot',
      cx: proj.sx, cy: proj.sy,
      r: 3 * proj.scale,
      fill: i === ANOMALY_IDX ? '#EF9F27' : '#E8E6DD',
      depth: proj.depth + 0.05,
    });
    // label
    renderables.push({
      type: 'worker-label',
      cx: proj.sx, cy: proj.sy + 32 * proj.scale,
      text: 'W·' + String(i + 1).padStart(2, '0'),
      fill: i === ANOMALY_IDX ? '#EF9F27' : '#888780',
      scale: proj.scale,
      depth: proj.depth + 0.05,
    });
  }

  // ── 4. Beam particles emit ──
  if (now - lastEmit > EMIT_INTERVAL) {
    lastEmit = now;
    for (let i = 0; i < NUM_WORKERS; i++) {
      // emit with bias toward visible (front-facing) workers
      const phase = (i / NUM_WORKERS) * 2 * Math.PI;
      const wz = ORBIT_RADIUS * Math.sin(phase);
      // post-yaw z:
      const yawCos = Math.cos(yaw);
      const yawSin = Math.sin(yaw);
      const wx = ORBIT_RADIUS * Math.cos(phase);
      const z1 = -wx * yawSin + wz * yawCos;
      // visibility: closer to viewer (z1 > 0) more likely to emit visibly
      const visibility = (z1 + ORBIT_RADIUS) / (2 * ORBIT_RADIUS);  // 0..1
      if (Math.random() < visibility * 0.7) {
        beamParticles.push({
          startTime: now,
          workerIdx: i,
          isAnomaly: i === ANOMALY_IDX,
          color: i === ANOMALY_IDX ? '#EF9F27' : (Math.random() < 0.65 ? '#9CC5E6' : '#F2C078'),
          size: 1.0 + Math.random() * 0.6,
        });
      }
    }
  }

  // ── 5. Beam particles update ──
  for (let bi = beamParticles.length - 1; bi >= 0; bi--) {
    const bp = beamParticles[bi];
    const age = now - bp.startTime;
    if (age > BEAM_LIFETIME) {
      beamParticles.splice(bi, 1);
      continue;
    }
    const t = age / BEAM_LIFETIME;
    // worker world position
    const phase = (bp.workerIdx / NUM_WORKERS) * 2 * Math.PI;
    const wx = ORBIT_RADIUS * Math.cos(phase);
    const wz = ORBIT_RADIUS * Math.sin(phase);
    const wy = ORBIT_Y;
    // particle interpolates from worker to nebula (y from ORBIT_Y to 0)
    const px = wx;
    const py = wy + (-wy) * t;  // from -240 to 0
    const pz = wz;

    const proj = project(px, py, pz, yaw);
    let op;
    if (t < 0.08) op = (t / 0.08) * 0.9;
    else if (t > 0.88) op = ((1 - t) / 0.12) * 0.9;
    else op = 0.9;

    renderables.push({
      type: 'circle',
      cx: proj.sx, cy: proj.sy,
      r: bp.size * proj.scale,
      fill: bp.color,
      opacity: op,
      depth: proj.depth,
    });
  }

  // ── 6. Refined particles (nebula → supervisor → director) ──
  if (now - lastRefinedEmit > REFINED_INTERVAL) {
    lastRefinedEmit = now;
    refinedParticles.push({
      startTime: now,
      color: Math.random() < 0.6 ? '#F2C078' : '#F5D89A',
      size: 1.3 + Math.random() * 0.4,
    });
  }
  for (let ri = refinedParticles.length - 1; ri >= 0; ri--) {
    const rp = refinedParticles[ri];
    const age = now - rp.startTime;
    if (age > REFINED_LIFETIME) {
      refinedParticles.splice(ri, 1);
      continue;
    }
    const t = age / REFINED_LIFETIME;
    let py;
    if (t < 0.55) py = 0 + (SUPERVISOR_Y - 0) * (t / 0.55);
    else py = SUPERVISOR_Y + (DIRECTOR_Y - SUPERVISOR_Y) * ((t - 0.55) / 0.45);

    const proj = project(0, py, 0, yaw);
    let op;
    if (t < 0.05) op = t * 20;
    else if (t > 0.95) op = (1 - t) * 20;
    else if (t > 0.5 &amp;&amp; t < 0.6) op = 1;
    else op = 0.85;

    renderables.push({
      type: 'circle',
      cx: proj.sx, cy: proj.sy,
      r: rp.size * proj.scale,
      fill: rp.color,
      opacity: Math.max(0, Math.min(1, op)),
      depth: proj.depth + 0.1,
    });
  }

  // ── 7. Spine segments (vertical lines connecting nebula → supervisor → director) ──
  // Only the segments behind nebula go behind, in front go in front. We draw two segments
  // from nebula center (0,0,0) to supervisor (0, SUPERVISOR_Y, 0), and supervisor to director.
  // Since they're on the Y axis (x=0, z=0), they project to a single x at (0,0,0) → (0, depth, 0).
  // Wait — the spine is at x=0, z=0 in world. With tilt, the spine becomes a tilted line on screen.
  const spineNebula = project(0, 0, 0, yaw);
  const spineSup = project(0, SUPERVISOR_Y, 0, yaw);
  const spineDir = project(0, DIRECTOR_Y, 0, yaw);
  renderables.push({
    type: 'line',
    x1: spineNebula.sx, y1: spineNebula.sy,
    x2: spineSup.sx, y2: spineSup.sy,
    stroke: 'rgba(242,192,120,0.55)',
    strokeWidth: 1.4,
    depth: 0,
  });
  renderables.push({
    type: 'line',
    x1: spineSup.sx, y1: spineSup.sy,
    x2: spineDir.sx, y2: spineDir.sy,
    stroke: 'rgba(242,192,120,0.55)',
    strokeWidth: 1.4,
    depth: 0,
  });
  // 작업자(L1) → 공용 검토대 성운 중심(L2) 연결선 — 구조를 직접 보이게
  for (let wi = 0; wi < workerProjs.length; wi++) {
    const wp = workerProjs[wi];
    renderables.push({
      type: 'link-line',
      x1: wp.proj.sx, y1: wp.proj.sy,
      x2: spineNebula.sx, y2: spineNebula.sy,
      stroke: wp.isAnomaly ? 'rgba(239,159,39,0.55)' : 'rgba(232,230,221,0.30)',
      strokeWidth: wp.isAnomaly ? 1.2 : 0.8,
      depth: -2,
    });
  }

  // ── 8. Supervisor &amp; Director nodes ──
  // Supervisor halo
  renderables.push({
    type: 'starlit-halo',
    cx: spineSup.sx, cy: spineSup.sy,
    r: 28 * spineSup.scale,
    depth: SUPERVISOR_Y - 0.3,
  });
  // Supervisor ring
  renderables.push({
    type: 'sup-ring',
    cx: spineSup.sx, cy: spineSup.sy,
    r: 7 * spineSup.scale,
    depth: SUPERVISOR_Y,
  });
  // Supervisor dot
  renderables.push({
    type: 'sup-dot',
    cx: spineSup.sx, cy: spineSup.sy,
    r: 2.5 * spineSup.scale,
    depth: SUPERVISOR_Y + 0.05,
  });
  // Agent B (offset in x from supervisor, on the rotating ring conceptually but let's put it at z=0, x=26)
  // Actually Agent B should rotate with the system — it's at world (26, SUPERVISOR_Y, 0)
  const agentB = project(26, SUPERVISOR_Y, 0, yaw);
  renderables.push({
    type: 'agent-b-ring',
    cx: agentB.sx, cy: agentB.sy,
    r: 6 * agentB.scale,
    depth: agentB.depth + SUPERVISOR_Y * 0.01,
  });
  renderables.push({
    type: 'agent-b-dot',
    cx: agentB.sx, cy: agentB.sy,
    r: 1.5 * agentB.scale,
    depth: agentB.depth + SUPERVISOR_Y * 0.01 + 0.05,
  });

  // Director halo
  renderables.push({
    type: 'starlit-halo',
    cx: spineDir.sx, cy: spineDir.sy,
    r: 36 * spineDir.scale,
    depth: DIRECTOR_Y - 0.3,
  });
  renderables.push({
    type: 'dir-ring',
    cx: spineDir.sx, cy: spineDir.sy,
    r: 9 * spineDir.scale,
    depth: DIRECTOR_Y,
  });
  renderables.push({
    type: 'dir-dot',
    cx: spineDir.sx, cy: spineDir.sy,
    r: 3.5 * spineDir.scale,
    depth: DIRECTOR_Y + 0.05,
  });

  // ── 9. Disk boundary indicator (very faint dashed ring at nebula equator) ──
  // The nebula's outer edge: ring of radius NEBULA_RADIUS at y=0 in xz plane.
  // We sample N points around the ring, project, and draw as a polyline.
  const NEBULA_RING_SAMPLES = 60;
  const ringPoints = [];
  for (let i = 0; i <= NEBULA_RING_SAMPLES; i++) {
    const a = (i / NEBULA_RING_SAMPLES) * 2 * Math.PI;
    const rx = NEBULA_RADIUS * Math.cos(a);
    const rz = NEBULA_RADIUS * Math.sin(a);
    const proj = project(rx, 0, rz, yaw);
    ringPoints.push(proj.sx + ',' + proj.sy);
  }
  // We render the ring as a single polyline behind everything (depth = -NEBULA_RADIUS - 1)
  renderables.push({
    type: 'ring-poly',
    points: ringPoints.join(' '),
    depth: -1000,  // always behind
  });

  // ── SORT by depth (back first) ──
  renderables.sort((a, b) => a.depth - b.depth);

  // ── BUILD SVG STRINGS · glow(디더 대상) / crisp(크리스프 오버레이) ──
  let glowFrags = '';
  let crispFrags = '';
  for (const r of renderables) {
    if (r.type === 'circle') {
      glowFrags += `<circle cx=&quot;${r.cx.toFixed(1)}&quot; cy=&quot;${r.cy.toFixed(1)}&quot; r=&quot;${r.r.toFixed(2)}&quot; fill=&quot;${r.fill}&quot; opacity=&quot;${r.opacity.toFixed(3)}&quot;/>`;
    } else if (r.type === 'pulsar-halo') {
      glowFrags += `<circle cx=&quot;${r.cx.toFixed(1)}&quot; cy=&quot;${r.cy.toFixed(1)}&quot; r=&quot;${r.r.toFixed(1)}&quot; fill=&quot;url(#pulsarGlow)&quot;/>`;
    } else if (r.type === 'pulsar-dot') {
      const pulse = 0.35 + 0.65 * (Math.sin(elapsed / 380) > 0.6 ? 1 : 0.4);
      crispFrags += `<circle cx=&quot;${r.cx.toFixed(1)}&quot; cy=&quot;${r.cy.toFixed(1)}&quot; r=&quot;${r.r.toFixed(2)}&quot; fill=&quot;#E24B4A&quot; opacity=&quot;${pulse.toFixed(2)}&quot;/>`;
    } else if (r.type === 'worker-halo') {

<script>
/* ── 디더 레이어 — 코스믹 성운의 톤 자체를 도트로 변환 ──
   SVG(성운·노드·별)를 매 프레임 캔버스로 굽고(rasterize) 그 명암을
   Bayer 4×4 오더드 디더로 다시 그림 → 매끄러운 성운 글로우가 곧 디더가 됨.
   점의 색은 장면의 색(따뜻한 코어·차가운 빛·빨간 펄서)을 유지.
   HTML 레일/역할 버튼/헤더는 위(z2+)에 크리스프하게 유지. */
(function () {
  const host = document.querySelector('.canvas');
  const svg  = document.querySelector('svg.cosmos');
  if (!host || !svg) return;

  const cv = document.createElement('canvas');
  cv.id = 'dither-layer';
  host.appendChild(cv);
  const ctx = cv.getContext('2d');
  const small = document.createElement('canvas');
  const sctx = small.getContext('2d', { willReadFrequently: true });

  const BAYER = [[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
  const CELL = 3, DOT = 2;     // 격자·점 크기 (세밀)
  const GAIN = 2.4;            // 성운이 dim 하므로 살짝 더 증폭
  const VOID = '#06070B';

  let W = 0, H = 0, dpr = 1;
  function resize() {
    const r = host.getBoundingClientRect();
    W = Math.max(2, Math.floor(r.width));
    H = Math.max(2, Math.floor(r.height));
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    cv.width = W * dpr; cv.height = H * dpr;
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  const DOT_GAIN = 2.4;   // dim 픽셀 최대 증폭 (밝은 픽셀은 색조 유지 위해 자동 제한)
  function dotColor(r, g, b) {
    const mx = r > g ? (r > b ? r : b) : (g > b ? g : b);
    if (mx <= 0) return 'rgb(0,0,0)';
    const f = Math.min(DOT_GAIN, 255 / mx);   // 가장 큰 채널이 255에 닿는 선까지만 → 흰색 클리핑 방지, 색 유지
    return 'rgb(' + ((r * f) | 0) + ',' + ((g * f) | 0) + ',' + ((b * f) | 0) + ')';
  }

  let img = null, rasterizing = false;
  function rasterize() {
    if (rasterizing || !W) return;
    rasterizing = true;
    const clone = svg.cloneNode(true);                 // 현재 프레임 상태 그대로 복제
    const cr = clone.querySelector('#system-crisp'); if (cr) cr.remove();  // 선·노드·라벨 제외
    clone.querySelectorAll('text').forEach(t => t.remove());               // 글자는 디더 안 함
    clone.setAttribute('width', W);
    clone.setAttribute('height', H);
    const str = new XMLSerializer().serializeToString(clone);
    const url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(str);
    const im = new Image();
    im.onload  = () => { img = im; rasterizing = false; };
    im.onerror = () => { rasterizing = false; };
    im.src = url;
  }

  let last = 0;
  function loop(ts) {
    requestAnimationFrame(loop);
    if (ts - last < 90) return;     // ~11fps (성운은 느리게 변하므로 충분)
    last = ts;
    rasterize();
    if (!img || !W) return;

    const cols = Math.ceil(W / CELL), rows = Math.ceil(H / CELL);
    small.width = cols; small.height = rows;
    sctx.clearRect(0, 0, cols, rows);
    try { sctx.drawImage(img, 0, 0, cols, rows); } catch (e) { return; }
    let data;
    try { data = sctx.getImageData(0, 0, cols, rows).data; } catch (e) { return; }

    ctx.fillStyle = VOID;
    ctx.fillRect(0, 0, W, H);
    for (let cy = 0; cy < rows; cy++) {
      const brow = BAYER[cy &amp; 3];
      for (let cx = 0; cx < cols; cx++) {
        const i = (cy * cols + cx) * 4;
        const r = data[i], g = data[i + 1], b = data[i + 2];
        const lum = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
        const t = (brow[cx &amp; 3] + 0.5) / 16;
        if (lum * GAIN > t) {
          ctx.fillStyle = dotColor(r, g, b);
          ctx.fillRect(cx * CELL, cy * CELL, DOT, DOT);
        }
      }
    }
  }
  requestAnimationFrame(loop);
})();
</script>

    background: #639922;

  /* 두 개의 큰 행동 카드 */
  .rr-actions {
    display: flex;
    gap: 16px;
    margin-top: 14px;
  }
  .rr-btn {
    flex: 1;
    background: #FAFAF8;
    border: 1px solid;
    border-radius: 8px;
    padding: 22px 18px 18px;
    cursor: pointer;
    text-align: center;
    transition: background 0.35s ease, box-shadow 0.35s ease, color 0.35s ease;
    font-family: inherit;
  }
  .rr-btn .label {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .rr-btn .desc  {
    font-size: 11px;
    line-height: 1.5;
  }
  .rr-btn .tap {
    display: inline-block;
    margin-top: 12px;
    width: 28px;
    height: 28px;
    border: 1px solid;
    border-radius: 50%;
    font-size: 11px;
    line-height: 26px;
    background: white;
  }
  .rr-btn-ok { border-color: #0F6E56; }
  .rr-btn-ok .label { color: #085041; }
  .rr-btn-ok .desc  { color: #0F6E56; }
  .rr-btn-ok .tap   { color: #085041; border-color: #0F6E56; }
  .rr-btn-ok:hover {
    background: #97C459;
    box-shadow:
      0 0 24px rgba(99, 153, 34, 0.7),
      0 0 48px rgba(151, 196, 89, 0.4);
  }
  .rr-btn-ok:hover .label,
  .rr-btn-ok:hover .desc { color: #0E2A04; }

  .rr-btn-alert { border-color: #854F0B; }
  .rr-btn-alert .label { color: #633806; }
  .rr-btn-alert .desc  { color: #854F0B; }
  .rr-btn-alert .tap   { color: #633806; border-color: #854F0B; }
  .rr-btn-alert:hover {
    background: #EF9F27;
    box-shadow:
      0 0 26px rgba(186, 117, 23, 0.85),
      0 0 52px rgba(239, 159, 39, 0.50);
  }
  .rr-btn-alert:hover .label,
  .rr-btn-alert:hover .desc { color: #2A1502; }

  /* 비활성 상태 — 7개가 모두 체크되면 이상 발견 비활성, 그 외엔 이상 없음 비활성
     호버 글로우/색상 변화를 모두 억제 (.rr-btn-ok.disabled:hover 등이
     기존 :hover 규칙보다 specificity 가 높아 자연스럽게 덮음) */
  .rr-btn.disabled {
    cursor: not-allowed;
    opacity: 0.32;
    filter: saturate(0.45);
  }
  .rr-btn.disabled:hover {
    background: #FAFAF8;
    box-shadow: none;
  }
  .rr-btn-ok.disabled:hover    .label { color: #085041; }
  .rr-btn-ok.disabled:hover    .desc  { color: #0F6E56; }
  .rr-btn-alert.disabled:hover .label { color: #633806; }
  .rr-btn-alert.disabled:hover .desc  { color: #854F0B; }

  .rr-caption {
    font-size: 11px;
    color: #888780;
    text-align: center;
    margin-top: 12px;
    letter-spacing: 0.01em;
  }
  .rr-caption .em { color: #3B6D11; font-weight: 500; }

  /* 체크리스트 모달 */
  .rr-modal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(44,44,42,0.55);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .rr-modal-overlay.open { opacity: 1; pointer-events: auto; }
  .rr-modal {
    background: white;
    width: 90%;
    max-width: 540px;
    border-radius: 12px;
    padding: 24px 28px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: translateY(-42px);
    opacity: 0;
    transition: transform 0.44s cubic-bezier(0.33,0,0.2,1), opacity 0.34s ease;
  }
  .rr-modal-overlay.open .rr-modal { transform: translateY(0); opacity: 1; }
  .rr-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
    flex: 0 0 auto;
  }
  .rr-modal-label {
    font-size: 11px;
    color: #888780;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .rr-modal-title {
    font-size: 16px;
    font-weight: 600;
    color: #2C2C2A;
  }
  .rr-modal-sub {
    font-size: 12px;
    color: #5F5E5A;
    margin-top: 4px;
  }
  .rr-modal-close {
    cursor: pointer;
    font-size: 22px;
    color: #888780;
    line-height: 1;
    padding: 4px 10px;
    user-select: none;
    transition: color 0.2s;
  }
  .rr-modal-close:hover { color: #2C2C2A; }
  .chk-list { display: flex; flex-direction: column; gap: 8px; flex: 1 1 auto; overflow-y: auto; min-height: 0; -webkit-overflow-scrolling: touch; padding-right: 4px; }
  .chk-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    cursor: pointer;
  }
  .chk-item.passed {
    background: #EAF3DE;
    border: 1px solid #C0DD97;
  }
  .chk-item.pending {
    background: #F5F4EE;
    border: 1px dashed #B4B2A9;
  }
  .chk-item input { margin-top: 2px; accent-color: #639922; }
  .chk-item .chk-title { font-size: 13px; font-weight: 500; }
  .chk-item.passed  .chk-title { color: #173404; }
  .chk-item.pending .chk-title { color: #444441; }
  .chk-item .chk-sub { font-size: 11px; margin-top: 2px; }
  .chk-item.passed  .chk-sub { color: #3B6D11; }
  .chk-item.pending .chk-sub { color: #888780; }

  .rr-modal-footer {
    margin-top: 16px;
    padding: 12px 14px;
    background: #FAEEDA;
    border: 1px solid #EF9F27;
    border-radius: 8px;
    font-size: 12px;
    color: #633806;
    line-height: 1.6;
    flex: 0 0 auto;
  }
  .rr-modal-footer strong { color: #412402; }

  /* ── Footer markers ─────────────────────────────── */
  .footer-marker, .footer-marker-right {
    position: absolute;
    bottom: 14px;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--text-faint);
    text-transform: uppercase;
    z-index: 5;
  }
  .footer-marker { left: 56px; }
  .footer-marker-right { right: 56px; }

  /* ── Vignette overlay (캡슐의 닫힌 감각) ────────── */
  .vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 4;
    background:
      radial-gradient(ellipse 80% 70% at 50% 55%,
        rgba(14,16,24,0) 50%,
        rgba(14,16,24,0.55) 90%,
        rgba(14,16,24,0.85) 100%);
  }

  /* ── 안내창 (Guidance Window) ──────────────────────
     청사진 §6: 시스템 *밖*의 메타 도구 — 박물관 캡션 톤
     · 위치: 왼쪽 아래 가장자리, 시스템 영역 밖 (.stage 레벨)
     · 활자: 매우 작게, 옅은 회색
     · 가시성을 위해 최소한의 사각 배경 — 단, 시스템(열람실)과
       *재료감이 다름*: 날카로운 모서리 + 단일 헤어라인 + 평면 (flat label)
     · 시스템: 둥근 모서리 + 글로우 + 솔리드 크림 (lifted screen)
     · 안내창: 평면 라벨 — 인쇄된 박물관 캡션처럼 정적
     · 3인칭 객관 서술 */
  .guidance-window {
    position: absolute;
    left: 56px;
    bottom: 50px;
    max-width: 360px;
    z-index: 5;
    /* 종이 같은 매우 옅은 반투명 면 — 시스템의 솔리드 크림과 구분 */
    background: rgba(232, 230, 221, 0.05);
    /* 단일 헤어라인 — 시스템의 부드러운 글로우와 정반대 */
    border: 1px solid rgba(180, 178, 169, 0.34);
    border-left-width: 2px;       /* 인쇄 캡션의 좌측 인덱스 룰 */
    border-left-color: rgba(180, 178, 169, 0.58);
    border-radius: 0;             /* 날카로운 모서리 — 시스템 12px와 구분 */
    padding: 13px 16px 11px 18px;
    /* 외곽 글로우 — 어두운 캡슐 위 가독성 확보. 따뜻한 회색-아이보리 톤
       (시스템의 차가운 빛 #9CC5E6 글로우와 구분). 평면 라벨의 정적 톤 유지 */
    box-shadow:
      0 0 22px  rgba(232, 230, 221, 0.10),
      0 0 56px  rgba(232, 230, 221, 0.05),
      0 0 110px rgba(240, 232, 200, 0.025);
    color: #6B6A64;
    font-family: &quot;Inter&quot;, &quot;Pretendard&quot;, &quot;Noto Sans KR&quot;, -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 300;
    letter-spacing: 0.02em;
    cursor: default;              /* 클릭 가능 표시 제거 — 자동 사라짐 */
    opacity: 0;
    transform: translateY(4px);
    transition:
      opacity     1.4s ease,
      transform   1.4s ease;
    pointer-events: none;
    user-select: none;
    backdrop-filter: blur(1.5px);
    -webkit-backdrop-filter: blur(1.5px);
  }
  .guidance-window.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .guidance-window.dismissed {
    opacity: 0;
    transform: translateY(0);
    transition: opacity 1.6s ease;
  }

  /* 좌상단 메타 라벨 — *시스템 밖* 임을 분명히 하는 작은 마크 */
  .guidance-window .gw-meta {
    font-size: 8.5px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #4F4E4A;
    margin-bottom: 7px;
    font-weight: 400;
  }
  .guidance-window .gw-line1 {
    font-size: 11px;
    color: inherit;
    margin-bottom: 5px;
    letter-spacing: 0.04em;
  }
  .guidance-window .gw-line1 .gw-time {
    font-variant-numeric: tabular-nums;
    margin-right: 10px;
    color: #807F77;
  }
  .guidance-window .gw-line2 {
    font-size: 10px;
    color: #58575250;  /* fallback below */
    color: rgba(88, 87, 82, 0.95);
    line-height: 1.55;
    letter-spacing: 0.02em;
    max-width: 320px;
  }
  /* 텍스트 교체 시의 부드러운 페이드 */
  .guidance-window .gw-fadewrap {
    transition: opacity 0.6s ease;
  }
  .guidance-window.swapping .gw-fadewrap {
    opacity: 0;
  }

  /* ── 진입 시퀀스 (Entry — page load → worker chamber) ─
     박사 논증 재배치 — 매개의 시간을 *진입*에 둠.
     실제 시연에서는 타이틀의 작업자 영역 줌-인과 이어질 자리.
     검토 단계에서는 단독으로 6.5초 진입을 보여줌:
       0~1.5s: 검은 화면 + 위→아래 빛의 흐름
       1.5~2.5s: 페이드인으로 작업자 화면 등장
       2.5~6.5s: 카메라가 위→아래 시점에서 우물 바닥→위 시점으로 이동 */
  .entry-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #0E1018;          /* scene 배경과 일치 — 페이드 시 깜빡임 없음 */
    pointer-events: none;
    opacity: 1;
    overflow: hidden;
    transition: opacity 1s ease;
  }
  .entry-overlay.fading-out { opacity: 0; }
  .entry-overlay.gone       { display: none; }

  .entry-beam {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* ── 매개 ① CSS 펄스 (Mediation 1 condensation) ────
     클릭 위치에 즉각적으로 형성되는 빛 응축
     · 3D 입자장의 공간적 응축과 짝지어 작동
     · 두 번째 클릭 시 흩어짐 */
  .mediation-pulse {
    position: fixed;
    left: 0;
    top: 0;
    width: 0;
    height: 0;
    pointer-events: none;
    border-radius: 50%;
    z-index: 12;
    transform: translate(-50%, -50%);
    mix-blend-mode: screen;
    opacity: 0;
    background: radial-gradient(circle,
      var(--pulse-color, #9CC5E6) 0%,
      var(--pulse-color, #9CC5E6) 8%,
      rgba(156,197,230,0.45) 28%,
      rgba(156,197,230,0.15) 55%,
      transparent 75%);
    will-change: width, height, opacity;
  }
  .mediation-pulse.amber {
    background: radial-gradient(circle,
      #F2C078 0%,
      #EF9F27 10%,
      rgba(239,159,39,0.45) 30%,
      rgba(239,159,39,0.15) 56%,
      transparent 78%);
  }

  /* ═══════════════════════════════════════════════════════════
     UI v1 · 화이트 각진 계기 그래머 (override)
     · 부드러운 크림+라운드+글로우 → 흰 계기 창
     · 직각 · 헤어라인 · 모노 라벨 · 반전 블록 · 등록표시
     · 어두운 공간은 유지, *창만* 화이트 (대화 결정)
     ═══════════════════════════════════════════════════════════ */
  :root {
    --rr-paper: #FAF9F5;
    --rr-paper-2: #FFFFFF;
    --rr-ink: #15171F;
    --rr-line: #C9C7BD;
    --rr-line-faint: #E6E5DC;
    --rr-mute: #5F5E5A;
    --rr-mute-2: #888780;
    --rr-mono: ui-monospace, &quot;SF Mono&quot;, Menlo, Consolas, monospace;
  }

  /* 창 본체 — 직각·헤어라인, 컬러 글로우 제거(부유용 평면 그림자만) */
  .reading-room {
    background: var(--rr-paper);
    border: 1px solid var(--rr-line);
    border-radius: 0;
    box-shadow: 0 28px 70px rgba(0,0,0,0.55);
    color: var(--rr-ink);
  }
  .reading-room .rr-mk {
    position: absolute; width: 10px; height: 10px;
    border: 1px solid var(--rr-mute-2); z-index: 3; pointer-events: none;
  }

  .rr-header, .rr-task {
    background: var(--rr-paper-2);
    border: 1px solid var(--rr-line);
    border-radius: 0;
  }
  .rr-header .name { color: var(--rr-ink); font-weight: 500; }
  .rr-header .meta { color: var(--rr-mute); font-family: var(--rr-mono); font-size: 11px; letter-spacing: 0.06em; }
  .rr-task-label { color: var(--rr-mute); font-family: var(--rr-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
  .rr-task-name { color: var(--rr-ink); }

  /* 체크리스트 뱃지 — 직각 모노 칩 */
  .rr-checklist-badge {
    background: var(--rr-paper-2);
    border: 1px solid var(--rr-line);
    border-radius: 0;
    color: var(--rr-ink);
    font-family: var(--rr-mono);
    font-size: 11px; font-weight: 400; letter-spacing: 0.08em;
  }
  .rr-checklist-badge:hover { background: #F1EFE8; box-shadow: none; }
  .rr-checklist-badge .dot { border-radius: 0; width: 7px; height: 7px; background: var(--rr-ink); }

  /* 두 행동 카드 — 직각·헤어라인, 호버=반전 블록(글로우 없음) */
  .rr-btn { background: var(--rr-paper-2); border-radius: 0; transition: background 0.18s, color 0.18s; }
  .rr-btn .tap { border-radius: 0; background: transparent; width: 24px; height: 24px; line-height: 22px; font-family: var(--rr-mono); }

  .rr-btn-ok { border-color: var(--rr-ink); }
  .rr-btn-ok .label { color: var(--rr-ink); }
  .rr-btn-ok .desc  { color: var(--rr-mute); }
  .rr-btn-ok .tap   { color: var(--rr-ink); border-color: var(--rr-ink); }
  .rr-btn-ok:hover { background: var(--rr-ink); box-shadow: none; }
  .rr-btn-ok:hover .label, .rr-btn-ok:hover .desc { color: var(--rr-paper); }
  .rr-btn-ok:hover .tap { color: var(--rr-paper); border-color: var(--rr-paper); }

  .rr-btn-alert { border-color: #BA7517; }
  .rr-btn-alert .label { color: #854F0B; }
  .rr-btn-alert .desc  { color: #BA7517; }
  .rr-btn-alert .tap   { color: #854F0B; border-color: #BA7517; }
  .rr-btn-alert:hover { background: #EF9F27; box-shadow: none; }
  .rr-btn-alert:hover .label, .rr-btn-alert:hover .desc { color: #412402; }
  .rr-btn-alert:hover .tap { color: #412402; border-color: #412402; }

  .rr-btn.disabled:hover { background: var(--rr-paper-2); box-shadow: none; }
  .rr-btn-ok.disabled:hover .label { color: var(--rr-ink); }
  .rr-btn-ok.disabled:hover .desc  { color: var(--rr-mute); }
  .rr-btn-alert.disabled:hover .label { color: #854F0B; }
  .rr-btn-alert.disabled:hover .desc  { color: #BA7517; }

  .rr-caption { color: var(--rr-mute); font-family: var(--rr-mono); font-size: 10px; letter-spacing: 0.05em; }
  .rr-caption .em { color: var(--rr-ink); font-weight: 500; }

  /* 체크리스트 모달 — 직각·헤어라인·반전 블록 */
  .rr-modal-overlay { background: rgba(6,7,11,0.62); border-radius: 0; backdrop-filter: none; -webkit-backdrop-filter: none; }
  .rr-modal { background: var(--rr-paper); border: 1px solid var(--rr-line); border-radius: 0; box-shadow: 0 18px 50px rgba(0,0,0,0.5); position: relative; }
  .rr-modal .rr-mk { position: absolute; width: 10px; height: 10px; border: 1px solid var(--rr-mute-2); }
  .rr-modal-label { color: var(--rr-mute); font-family: var(--rr-mono); letter-spacing: 0.15em; }
  .rr-modal-title { color: var(--rr-ink); font-weight: 500; }
  .rr-modal-sub { color: var(--rr-mute); }
  .rr-modal-close { color: var(--rr-mute); border-radius: 0; }
  .rr-modal-close:hover { color: var(--rr-ink); }

  .chk-item { border-radius: 0; }
  .chk-item.passed { background: var(--rr-ink); border: 1px solid var(--rr-ink); }
  .chk-item.passed .chk-title { color: var(--rr-paper); }
  .chk-item.passed .chk-sub   { color: #B4B2A9; }
  .chk-item.pending { background: var(--rr-paper-2); border: 1px dashed var(--rr-line); }
  .chk-item.pending .chk-title { color: #444441; }
  .chk-item.pending .chk-sub   { color: var(--rr-mute-2); }
  .chk-item input { accent-color: var(--rr-ink); }

  .rr-modal-footer { background: #FAEEDA; border: 1px solid #BA7517; border-radius: 0; color: #633806; font-family: var(--rr-mono); font-size: 11px; letter-spacing: 0.02em; }
  .rr-modal-footer strong { color: #412402; }

  /* 타이틀 복귀 — 역할 전환 의례 */
  .back-to-title {
    align-self: flex-start;
    font-family: var(--rr-mono); font-size: 11px; letter-spacing: 0.14em;
    color: var(--text-secondary); background: transparent;
    border: 1px solid var(--line-strong); border-radius: 0;
    padding: 6px 11px; margin-bottom: 8px; cursor: pointer;
    transition: color 0.18s, border-color 0.18s;
  }
  .back-to-title:hover { color: var(--text-primary); border-color: var(--text-secondary); }

  /* 디더 레이어 — 장면 톤 자체를 도트로 변환 (대화 결정: 그라데이션→디더) */
  #dither-layer {
    position: absolute; inset: 0; z-index: 1; pointer-events: none;
    border: 1px solid rgba(180,178,169,0.20);   /* 디더 패널을 박스로 분리 */
  }
  /* 매끄러운 비네트 그라데이션 제거 — 디더가 장면의 명암을 직접 표현 */
  .vignette { display: none; }

<script src=&quot;https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js&quot;></script>
<script>
/* ──────────────────────────────────────────────────────
 * Scene: 자기 캡슐 안 (Worker Chamber) — v0.1
 *
 * 좌표계 약속:
 *   · 카메라 위치: (0, 1.6, 0) — 작업자의 눈높이
 *   · 카메라 lookAt: (0, 3.2, -2.6) — 살짝 위를 올려다봄
 *   · 캡슐 폭 약 3.0m, 깊이 약 3.0m, 천장 6m+ (열린 위쪽)
 *   · 정면 z=-2.8, 측면 x=±1.5, 바닥 y=0
 * ──────────────────────────────────────────────────── */

const canvas = document.getElementById('scene-canvas');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0E1018);
scene.fog = new THREE.FogExp2(0x0E1018, 0.06);

const camera = new THREE.PerspectiveCamera(60, 1, 0.05, 80);
// 진입 시퀀스 — 첫 프레임은 *살짝 위에서 내려다보는* 시점.
// updateEntry()가 4초에 걸쳐 우물 바닥에서 올려다보는 시점으로 전이시킴.
camera.position.set(0, 2.7, 0.5);
camera.lookAt(0, 0.8, -2.2);

const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true,
  alpha: false,
  preserveDrawingBuffer: true,
  powerPreference: 'high-performance'
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputEncoding = THREE.LinearEncoding;
renderer.setClearColor(0x0E1018, 1.0);

function resize() {
  const rect = canvas.getBoundingClientRect();
  const w = Math.max(2, Math.floor(rect.width));
  const h = Math.max(2, Math.floor(rect.height));
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

const root = new THREE.Group();
scene.add(root);

/* ──────────────────────────────────────────────────────
 * Procedural textures (모든 비주얼은 코드로 생성)
 * ──────────────────────────────────────────────────── */

function makeWallTexture() {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 1024;
  const ctx = c.getContext('2d');

  // base translucent dark — 새 void-2 톤(20,22,30)에 맞춤
  ctx.fillStyle = 'rgba(20,22,30,0.62)';
  ctx.fillRect(0, 0, 512, 1024);

  // top-down gradient — light gathers at the top edge of capsule
  const grad = ctx.createLinearGradient(0, 0, 0, 1024);
  grad.addColorStop(0.00, 'rgba(156,197,230,0.07)');
  grad.addColorStop(0.18, 'rgba(156,197,230,0.025)');
  grad.addColorStop(0.55, 'rgba(156,197,230,0.0)');
  grad.addColorStop(1.00, 'rgba(0,0,0,0.18)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 512, 1024);

  // 후지모토적 가는 세로 격자 (모든 8px)
  ctx.strokeStyle = 'rgba(180,178,169,0.055)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= 512; x += 8) {
    ctx.beginPath();
    ctx.moveTo(x + 0.5, 0);
    ctx.lineTo(x + 0.5, 1024);
    ctx.stroke();
  }

  // 좀 더 진한 격자 (32px 마다)
  ctx.strokeStyle = 'rgba(180,178,169,0.10)';
  for (let x = 0; x <= 512; x += 32) {
    ctx.beginPath();
    ctx.moveTo(x + 0.5, 0);
    ctx.lineTo(x + 0.5, 1024);
    ctx.stroke();
  }

  // 가장 진한 골격 (128px)
  ctx.strokeStyle = 'rgba(180,178,169,0.16)';
  for (let x = 0; x <= 512; x += 128) {
    ctx.beginPath();
    ctx.moveTo(x + 0.5, 0);
    ctx.lineTo(x + 0.5, 1024);
    ctx.stroke();
  }

  // 미세한 가로선 — 다실의 살(目)
  ctx.strokeStyle = 'rgba(180,178,169,0.045)';
  for (let y = 0; y < 1024; y += 256) {
    ctx.beginPath();
    ctx.moveTo(0, y + 0.5);
    ctx.lineTo(512, y + 0.5);
    ctx.stroke();
  }

  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  return tex;
}

function makeShadowTexture() {
  // 휴머노이드 실루엣 — 블러 유리 너머의 형태
  const c = document.createElement('canvas');
  c.width = 256; c.height = 512;
  const ctx = c.getContext('2d');

  // canvas2D 블러 필터 — 후속 draw 들이 모두 8px 블러 처리됨.
  // 이미 부드러운 라디얼 그라디언트 + 추가 블러로 *블러 유리 너머 형태* 시각언어 강화
  ctx.filter = 'blur(8px)';

  // 몸통 영역 — 큰 타원 (alpha 살짝 부스트해 블러로 인한 강도 손실 보강)
  const torso = ctx.createRadialGradient(128, 320, 20, 128, 320, 150);
  torso.addColorStop(0,    'rgba(78,94,108,0.78)');
  torso.addColorStop(0.45, 'rgba(48,60,72,0.42)');
  torso.addColorStop(1,    'rgba(20,26,32,0.0)');
  ctx.fillStyle = torso;
  ctx.fillRect(0, 0, 256, 512);

  // 머리 영역
  const head = ctx.createRadialGradient(128, 170, 8, 128, 170, 70);
  head.addColorStop(0,   'rgba(92,108,120,0.92)');
  head.addColorStop(0.6, 'rgba(52,66,76,0.38)');
  head.addColorStop(1,   'rgba(20,26,32,0.0)');
  ctx.fillStyle = head;
  ctx.fillRect(0, 0, 256, 512);

  // 어깨 — 넓은 가로 디퓨즈
  const shoulder = ctx.createRadialGradient(128, 240, 30, 128, 240, 130);
  shoulder.addColorStop(0,   'rgba(68,84,96,0.52)');
  shoulder.addColorStop(0.7, 'rgba(38,50,60,0.18)');
  shoulder.addColorStop(1,   'rgba(20,26,32,0.0)');
  ctx.fillStyle = shoulder;
  ctx.fillRect(0, 0, 256, 512);

  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  return tex;
}

function makeHazeTexture() {
  // 위계의 흐릿한 빛 — 중앙이 가장 밝고 가장자리로 페이드
  const c = document.createElement('canvas');
  c.width = 1024; c.height = 512;
  const ctx = c.getContext('2d');

  const grad = ctx.createRadialGradient(512, 280, 40, 512, 280, 480);
  grad.addColorStop(0.00, 'rgba(240,232,200,0.34)');
  grad.addColorStop(0.18, 'rgba(240,232,200,0.18)');
  grad.addColorStop(0.45, 'rgba(240,232,200,0.06)');
  grad.addColorStop(0.85, 'rgba(240,232,200,0.012)');
  grad.addColorStop(1.00, 'rgba(240,232,200,0.0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 1024, 512);

  // 약간의 노이즈 — 살아있는 헤이즈
  const img = ctx.getImageData(0, 0, 1024, 512);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (Math.random() - 0.5) * 6;
    d[i]   = Math.max(0, Math.min(255, d[i]   + n));
    d[i+1] = Math.max(0, Math.min(255, d[i+1] + n));
    d[i+2] = Math.max(0, Math.min(255, d[i+2] + n));
  }
  ctx.putImageData(img, 0, 0);

  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  return tex;
}

function makeFloorGlowTexture() {
  // 캡슐 바닥에 옅게 떨어지는 빛 자취
  const c = document.createElement('canvas');
  c.width = 512; c.height = 512;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
  grad.addColorStop(0,   'rgba(156,197,230,0.085)');
  grad.addColorStop(0.4, 'rgba(156,197,230,0.025)');
  grad.addColorStop(1,   'rgba(156,197,230,0.0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 512, 512);
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  return tex;
}

function makeParticleTexture() {
  // 둥글고 매우 부드러운 점 (입자장)
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 30);
  grad.addColorStop(0.00, 'rgba(232,230,221,1.0)');
  grad.addColorStop(0.35, 'rgba(232,230,221,0.42)');
  grad.addColorStop(0.7,  'rgba(232,230,221,0.10)');
  grad.addColorStop(1.0,  'rgba(232,230,221,0.0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 64, 64);
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  return tex;
}

const wallTex     = makeWallTexture();

/* ──────────────────────────────────────────────────────
 * 옆 캡슐들의 작업자 그림자 (block of life beyond glass)
 *   · 측벽 너머에 위치 — 측벽이 반투명이라 어렴풋이 보임
 *   · 매우 느린 흔들림 (외롭지 않지만 분리된 톤)
 * ──────────────────────────────────────────────────── */
const sideShadows = [];
function addShadow(x, y, z, w, h, baseOp) {
  const m = new THREE.MeshBasicMaterial({
    map: shadowTex,
    transparent: true,
    opacity: baseOp,
    depthWrite: false,
    blending: THREE.NormalBlending
  });
  const g = new THREE.PlaneGeometry(w, h);
  const mesh = new THREE.Mesh(g, m);
  mesh.position.set(x, y, z);
  mesh.userData = {
    base: mesh.position.clone(),
    phase: Math.random() * Math.PI * 2,
    // 블러 유리 너머 형태가 더 또렷히 인지되도록 강화:
    //   주기: ~16-35s → ~6-11s (약 3배 빠름)
    //   진폭: 좌우 0.10-0.20m → 0.22-0.40m, 상하 0.04-0.09m → 0.10-0.20m (약 2배)
    speed: 0.55 + Math.random() * 0.50,
    swayX: 0.22 + Math.random() * 0.18,
    swayY: 0.10 + Math.random() * 0.10,
    // 미세 트레모르 — 위상 다른 작은 고주파 흔들림 (작업자가 *살아있음*의 신호)
    microSpeed: 1.8 + Math.random() * 1.4,
    microPhase: Math.random() * Math.PI * 2,
    baseOp: baseOp
  };
  sideShadows.push(mesh);
  root.add(mesh);
  return mesh;
}
// 왼쪽 옆 캡슐 (블러 유리 통과 보강을 위해 opacity 상향)
addShadow(-2.6, 1.55, -1.7, 1.4, 2.5, 0.75);

 * 자기 캡슐 — 측벽 / 정면 / 바닥
 *   측벽은 그림자를 부분적으로 가리는 frosted glass 역할
 * ──────────────────────────────────────────────────── */
function makeWall(width, height) {
  const m = new THREE.MeshBasicMaterial({
    map: wallTex.clone(),
    transparent: true,
    // 측벽 너머 옆 작업자 그림자가 *흐릿하게* 보이게 투과도 확보
    // (이전 0.92는 너무 불투명해 그림자가 가려짐)
    opacity: 0.65,
    side: THREE.DoubleSide,
    depthWrite: false
  });
  m.map.needsUpdate = true;
  const g = new THREE.PlaneGeometry(width, height);
  return new THREE.Mesh(g, m);
}

  const m = new THREE.LineBasicMaterial({
    color: 0x9CC5E6,
    transparent: true,
    opacity: opacity,
    depthWrite: false
  });
  return new THREE.Line(g, m);
}

/* ──────────────────────────────────────────────────────
 * 매개 ① focal light (3D 헤일로)
 *   · 클릭의 3D 투영 지점에 부드러운 빛 응축
 *   · 패널 뒤에 위치 — 패널 가장자리로 헤일로가 새어나옴
 *   · CSS 펄스(클릭점 위 정점)와 짝지어 작동
 * ──────────────────────────────────────────────────── */
function makeFocalGlowTex() {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 256;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
  grad.addColorStop(0.00, 'rgba(255,255,255,1.00)');
  grad.addColorStop(0.10, 'rgba(255,255,255,0.78)');
  grad.addColorStop(0.30, 'rgba(255,255,255,0.28)');
  grad.addColorStop(0.60, 'rgba(255,255,255,0.07)');
  grad.addColorStop(1.00, 'rgba(255,255,255,0.00)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 256, 256);
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  return tex;
}
const focalLightMat = new THREE.MeshBasicMaterial({
  map: makeFocalGlowTex(),
  transparent: true,
  opacity: 0,
  blending: THREE.AdditiveBlending,
  depthWrite: false,

 *   · ②③: 입력 색 (차가운 빛 / 앰버)
 *   · ④:   따뜻한 빛 (앰버 입력이면 살짝 따뜻한 톤)

// 캡슐 위쪽 출구점 (자기 에이전트 A의 출구) + 위계 헤이즈 시작점
const FLOW_EXIT_POINT = new THREE.Vector3(0,    3.05, -2.83);
const FLOW_HAZE_START = new THREE.Vector3(0,    5.80, -3.00);

/* ──────────────────────────────────────────────────────
 * 매개 ⑤ — 통제 명령 (결정 거동)
 *   청사진 §3.5 + §4.2:
 *   · 위쪽 흐릿한 빛이 응축 → 날카로운 결정 형태 형성 → 내려옴
 *   · 캡슐 위쪽 가장자리에 *박힘* — 흡수되지 않고 단단함 유지
 *   · 박힌 형태는 체험이 끝날 때까지 그 자리에 머묾 (페이드 X)
 *   · 매개 ④의 유체 거동과 *물질 상태가 다름* — 압축 / 결정화 / 박힘
 * ──────────────────────────────────────────────────── */
function makeCrystalTexture() {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 512;
  const ctx = c.getContext('2d');

  // 외곽 글로우 — 너무 강하면 부드러워 보이므로 살짝만
  ctx.shadowColor    = 'rgba(239, 159, 39, 0.55)';
  ctx.shadowBlur     = 14;
  ctx.shadowOffsetX  = 0;
  ctx.shadowOffsetY  = 0;

  // 날카로운 결정/바늘 — 위/아래 뾰족 + 중간 측면 spike (다이아몬드 + 돌기)
  const cx = 128;
  ctx.beginPath();
  ctx.moveTo(cx,        28);        // top point (예리)
  ctx.lineTo(cx + 22,  198);        // upper right shoulder
  ctx.lineTo(cx + 38,  256);        // mid right spike
  ctx.lineTo(cx + 22,  314);        // lower right shoulder
  ctx.lineTo(cx +  6,  468);        // approach bottom
  ctx.lineTo(cx,       488);        // bottom point (가장 예리)
  ctx.lineTo(cx -  6,  468);
  ctx.lineTo(cx - 22,  314);
  ctx.lineTo(cx - 38,  256);
  ctx.lineTo(cx - 22,  198);
  ctx.closePath();

  // 단단한 결정 그라디언트 — 면이 명확히 갈라져 보임
  const grad = ctx.createLinearGradient(cx - 40, 0, cx + 40, 0);
  grad.addColorStop(0.00, '#A86412');
  grad.addColorStop(0.42, '#EF9F27');
  grad.addColorStop(0.55, '#F8C470');
  grad.addColorStop(1.00, '#A86412');
  ctx.fillStyle = grad;
  ctx.fill();

  // 가장자리 — 결정 면 (sharp edge highlight)
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur  = 0;
  ctx.strokeStyle = 'rgba(255, 220, 150, 0.92)';
  ctx.lineWidth   = 1.2;
  ctx.stroke();

  // 중앙 수직 하이라이트 — 결정 축
  ctx.beginPath();
  ctx.moveTo(cx, 28);
  ctx.lineTo(cx, 488);
  ctx.strokeStyle = 'rgba(255, 240, 200, 0.42)';
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  return tex;
}

const crystalMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(0.42, 0.95),
  new THREE.MeshBasicMaterial({

    transparent: true,
    opacity: 0,

  })
);
crystalMesh.visible = false;

// 매개 ⑤ 좌표 — crystal CENTER 기준 (bottom tip이 캡슐 가장자리에 박히도록 height/2 만큼 위)

/* ──────────────────────────────────────────────────────
 * (다음 단계 자리표)
 *   · 자기 에이전트 A의 출구 — 정면벽 위쪽 한 점
